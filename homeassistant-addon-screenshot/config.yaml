name: "HA MCP Dashboard Screenshot Engine"
description: "Opt-in headless-Chromium engine that renders a Home Assistant Lovelace dashboard to a PNG for the HA MCP ha_get_dashboard_screenshot tool. Derived from balloob's Puppet add-on (Apache-2.0)."
version: "1.0.0"
slug: "ha_mcp_screenshot"
url: "https://github.com/homeassistant-ai/ha-mcp"
# No `image:` key — the Supervisor builds this add-on locally on-device
# (same pattern as homeassistant-addon-webhook-proxy), so there is no
# multi-arch publish pipeline to maintain. Opt-in: only users who enable
# dashboard screenshot mode install it, so Chromium is never pulled otherwise.
#
# No `homeassistant_api` — the engine authenticates to HA only with the
# user-configured long-lived access_token (injected into the browser), never
# the Supervisor token, so it needs no Supervisor-granted HA API access.
init: false
startup: application
boot: auto
arch:
  - aarch64
  - amd64
# No host `ports:` mapping — the engine's HTTP listener performs NO inbound
# auth, so it must never be reachable from the LAN. ha-mcp reaches it over the
# internal Docker/Supervisor network by hostname (see
# dashboard_screenshot/provision.py), which does not require a published port.
# The optional preview UI is fronted by HA's authenticated ingress proxy.
ingress: true
ingress_port: 10000
options:
  access_token: ""
  keep_browser_open: false
  home_assistant_url: "http://homeassistant:8123"
schema:
  access_token: str?
  keep_browser_open: bool?
  home_assistant_url: str?
