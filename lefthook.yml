pre-commit:
  jobs:
    - group:
        parallel: true
        jobs:
          - name: ruff
            glob: "**/*.py"
            run: uv run ruff check {staged_files} --fix
            stage_fixed: true
          - name: ruff-format
            glob: "**/*.py"
            run: uv run ruff format {staged_files}
            stage_fixed: true
          - name: ast-grep
            glob:
              - "src/ha_mcp/tools/*.py"
              - "src/ha_mcp/tools/**/*.py"
            run: uv run ast-grep scan {staged_files}
          - name: uv-lock
            glob: "pyproject.toml"
            run: uv lock

    - group:
        parallel: true
        jobs:
          - name: mypy
            glob: "**/*.py"
            run: uv run mypy src/ homeassistant-addon/ scripts/
          - name: mypy-webhook-proxy
            glob: "**/*.py"
            # Two separate invocations, not one with both paths: mypy infers
            # each file's module name from its basename, and both flavors'
            # start.py collide ("Duplicate module named start") when checked
            # together in one run.
            run: uv run mypy homeassistant-addon-webhook-proxy/start.py && uv run mypy homeassistant-addon-webhook-proxy-dev/start.py
          - name: unit-tests
            glob:
              - "**/*.py"
              - "pyproject.toml"
            run: cd tests && uv run pytest src/unit/ addon/test_addon_startup.py -n auto -m "not slow" --tb=short -q
