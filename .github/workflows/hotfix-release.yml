name: Hotfix Release

# Releases hotfix branches when their PR is merged to master
# Hotfix branches must be based on a stable tag, not master HEAD
on:
  pull_request:
    types: [closed]
    branches: [master, main]

# Serialize with every other workflow that pushes to master (sync-tool-docs,
# addon-publish-dev, semver-release). semantic-release's internal push aborts
# hard when origin/master moves mid-run ("Upstream branch ... has changed") and
# that abort is not retryable from inside the action, so the only safe fix is
# to keep master writers from overlapping. cancel-in-progress stays false: a
# queued release must run, not be cancelled.
concurrency:
  group: master-write
  cancel-in-progress: false
  # queue: max keeps every queued run waiting FIFO. The default single-slot
  # queue evicts the OLDER pending run when a new one queues, which could
  # silently drop a queued release behind a bot push.
  queue: max

env:
  PYTHON_VERSION: "3.13"

jobs:
  semantic-release:
    name: Semantic Release
    # Only run for merged hotfix PRs
    if: |
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'hotfix/')
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.semantic.outputs.released }}
      version: ${{ steps.semantic.outputs.version }}
    permissions:
      contents: write
      id-token: write
      pull-requests: write
      issues: write

    steps:
    # Generate GitHub App token with bypass permissions: the master ruleset
    # ("changes must be made through a pull request") rejects pushes made with
    # the plain GITHUB_TOKEN, which is exactly how the v7.12.1 hotfix release
    # failed — semantic-release's version/changelog push to master came back
    # "push declined due to repository rule violations". Mirrors the step
    # semver-release.yml has always used for the same push.
    - name: Generate GitHub App token
      id: app-token
      uses: actions/create-github-app-token@v3
      with:
        app-id: ${{ secrets.RELEASE_APP_ID }}
        private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
      # Fallback to RELEASE_TOKEN (PAT) or GITHUB_TOKEN if app credentials not configured
      continue-on-error: true

    - name: Checkout master tip
      uses: actions/checkout@v7
      with:
        # Check out master BY NAME, not the event's frozen merge_commit_sha:
        # a named branch ref gives an attached local master branch, which
        # python-semantic-release matches against [tool.semantic_release].branch
        # (a detached HEAD checkout of a bare SHA "cannot match any release
        # groups", which is what broke PR #1090). Using the live tip also folds
        # in any [skip ci] bot commits that landed right after the merge and —
        # unlike the pinned SHA — lets a re-run of a failed release recover
        # instead of aborting forever on "Upstream branch ... has changed".
        ref: master
        fetch-depth: 0
        # Priority: GitHub App token > RELEASE_TOKEN (PAT) > GITHUB_TOKEN.
        # This credential persists into the repo's git config, so the later
        # changelog-sync and stable-tag pushes in this job use it too.
        token: ${{ steps.app-token.outputs.token || secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

    - name: Require stable tag exists
      run: |
        # Hotfix ORIGIN (branch based on the stable tag, not master) is validated
        # PRE-merge in pr-validate-hotfix.yml, which checks out the unmerged
        # branch head. Doing it here is impossible: post-merge HEAD is master's
        # tip, and because master is never rewritten, `stable` is ALWAYS an
        # ancestor of it — so `merge-base --is-ancestor stable HEAD` can never
        # fail. The former ancestor check here was therefore dead code. The one
        # thing still worth guarding is that `stable` exists at all: a hotfix
        # must have been based on it, and the release below repoints it. (This
        # missing-tag guard is not redundant with pr-validate-hotfix.yml, which
        # only warns-and-skips when the tag is absent.)
        if ! git rev-parse -q --verify refs/tags/stable >/dev/null; then
          echo "::error::No 'stable' tag found — a hotfix must be based on the stable release."
          exit 1
        fi
        echo "✓ stable tag present"

    - name: Run semantic-release
      id: semantic
      uses: python-semantic-release/python-semantic-release@39dd2052f2ce8282a5d932c31d58a2ca06d2550e # v10.6.1
      with:
        # Use GitHub App token with bypass permissions (see app-token step)
        github_token: ${{ steps.app-token.outputs.token || secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        verbosity: "2"
        # Don't create GitHub release here - we'll create a draft below
        vcs_release: "false"

    - name: Create draft GitHub release
      if: steps.semantic.outputs.released == 'true'
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
      run: |
        VERSION="${{ steps.semantic.outputs.version }}"
        TAG="v${VERSION}"

        # Extract changelog for this version (content between version headers)
        awk -v ver="## v${VERSION}" '$0 ~ "^"ver {found=1; next} found && /^## v[0-9]/ {exit} found' CHANGELOG.md > release_notes.md
        if [ ! -s release_notes.md ]; then
          echo "Hotfix Release v${VERSION}" > release_notes.md
          echo "" >> release_notes.md
          echo "Critical bug fix - see PR #${{ github.event.pull_request.number }}" >> release_notes.md
        fi

        # Create draft release (build-binary.yml will add binaries and publish)
        gh release create "$TAG" \
          --title "🚨 Hotfix $TAG" \
          --notes-file release_notes.md \
          --draft

        echo "✓ Created draft hotfix release $TAG (waiting for binaries)"

    - name: Copy changelog to addon directory
      if: steps.semantic.outputs.released == 'true'
      run: |
        set -e
        cp CHANGELOG.md homeassistant-addon/CHANGELOG.md
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add homeassistant-addon/CHANGELOG.md
        git diff --staged --quiet || git commit -m "chore(addon): sync changelog for Home Assistant add-on [skip ci]"
        # Master can advance between checkout and this push (bot commits from
        # other workflows); retry with a rebase instead of failing the release.
        # Mirrors the loop in sync-tool-docs.yml.
        for attempt in 1 2 3 4 5; do
          if git push origin HEAD:master; then
            echo "Synced addon changelog (attempt ${attempt})."
            exit 0
          fi
          echo "Push rejected on attempt ${attempt}; rebasing onto origin/master and retrying."
          # Abort a conflicted rebase so later attempts fail for the real reason.
          git pull --rebase origin master || {
            git rebase --abort 2>/dev/null || true
            echo "::error::Rebase onto origin/master failed; aborting retries."
            exit 1
          }
        done
        echo "::error::Could not push addon changelog sync after 5 attempts."
        exit 1

    - name: Update stable git tag
      if: steps.semantic.outputs.released == 'true'
      run: |
        VERSION="${{ steps.semantic.outputs.version }}"
        echo "Updating 'stable' tag to point to v$VERSION"

        git tag -d stable 2>/dev/null || true
        git push origin :refs/tags/stable 2>/dev/null || true

        git tag stable "v$VERSION"
        git push origin stable

        echo "✓ 'stable' tag now points to v$VERSION"

    - name: Summary
      if: steps.semantic.outputs.released == 'true'
      env:
        # Route the untrusted PR branch name through env, not template
        # interpolation, so shell metacharacters in the branch name cannot
        # inject commands into this run: script.
        HEAD_REF: ${{ github.event.pull_request.head.ref }}
      run: |
        echo "## 🚨 Hotfix Release" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Version:** ${{ steps.semantic.outputs.version }}" >> $GITHUB_STEP_SUMMARY
        echo "**Branch:** $HEAD_REF" >> $GITHUB_STEP_SUMMARY
        echo "**PR:** #${{ github.event.pull_request.number }}" >> $GITHUB_STEP_SUMMARY

  # Build binaries and attach to release
  build-and-release:
    needs: semantic-release
    if: needs.semantic-release.outputs.released == 'true'
    uses: ./.github/workflows/_build-and-release.yml
    with:
      release_tag: v${{ needs.semantic-release.outputs.version }}
      is_prerelease: false
    permissions:
      contents: write

  # Build and push addon Docker images
  build-addon:
    needs: semantic-release
    if: needs.semantic-release.outputs.released == 'true'
    uses: ./.github/workflows/addon-publish.yml
    with:
      version: ${{ needs.semantic-release.outputs.version }}
    permissions:
      contents: read
      packages: write

  # Update addon config.yaml after images are published
  update-addon-config:
    needs: [semantic-release, build-addon]
    if: needs.semantic-release.outputs.released == 'true'
    uses: ./.github/workflows/_update-addon-config.yml
    with:
      version: ${{ needs.semantic-release.outputs.version }}
      commit_message_prefix: 'publish hotfix version'
    secrets:
      RELEASE_APP_ID: ${{ secrets.RELEASE_APP_ID }}
      RELEASE_APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
    permissions:
      contents: write
