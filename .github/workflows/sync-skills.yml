name: Sync bundled skills

on:
  schedule:
    # Run weekly on Mondays at 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-skills:
    name: Sync skills from homeassistant-ai/skills
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ha-mcp
        uses: actions/checkout@v6

      - name: Fetch latest skills
        run: |
          SKILLS_DIR="src/ha_mcp/resources/skills/home-assistant-best-practices"
          REPO="homeassistant-ai/skills"
          BRANCH="main"
          SRC_PREFIX="skills/home-assistant-best-practices"

          # Fetch all skill files from the skills repo
          FILES=(
            "SKILL.md"
            "references/automation-patterns.md"
            "references/device-control.md"
            "references/examples.yaml"
            "references/helper-selection.md"
            "references/safe-refactoring.md"
            "references/template-guidelines.md"
          )

          for file in "${FILES[@]}"; do
            mkdir -p "$SKILLS_DIR/$(dirname "$file")"
            curl -sL \
              "https://raw.githubusercontent.com/${REPO}/${BRANCH}/${SRC_PREFIX}/${file}" \
              -o "$SKILLS_DIR/$file"
          done

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b chore/sync-skills
          git add src/ha_mcp/resources/skills/
          git commit -m "chore: sync bundled skills from homeassistant-ai/skills"
          git push -f origin chore/sync-skills
          # Create PR if one doesn't already exist
          if ! gh pr list --head chore/sync-skills --state open --json number --jq '.[0].number' | grep -q .; then
            gh pr create \
              --title "chore: sync bundled skills from homeassistant-ai/skills" \
              --body "Automated sync of bundled skill files from [homeassistant-ai/skills](https://github.com/homeassistant-ai/skills).

          This PR was created automatically by the \`sync-skills\` workflow." \
              --label chore
          fi
