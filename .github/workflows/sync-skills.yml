name: Sync bundled skills

on:
  schedule:
    # Check daily — only creates a PR if the skills repo has new commits
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-skills:
    name: Sync skills from homeassistant-ai/skills
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ha-mcp
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Update skills submodule
        run: git submodule update --remote vendor/skills

      - name: Sync to package resources
        run: bash scripts/sync-skills.sh

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b chore/sync-skills
          git add src/ha_mcp/resources/skills/ vendor/skills
          git commit -m "chore: sync bundled skills from homeassistant-ai/skills"
          git push -f origin chore/sync-skills
          # Create PR if one doesn't already exist
          if ! gh pr list --head chore/sync-skills --state open --json number --jq '.[0].number' | grep -q .; then
            gh pr create \
              --title "chore: sync bundled skills from homeassistant-ai/skills" \
              --body "Automated sync of bundled skill files from [homeassistant-ai/skills](https://github.com/homeassistant-ai/skills).

          Automated sync — the skills submodule has new commits." \
              --label chore
          fi
