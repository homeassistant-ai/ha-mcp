name: HAOS E2E Tests (inaddon)

# Parallel to haos-e2e-tests.yml — exercises the SAME test suite against
# the SAME cached qcow2, but routes ``mcp_client`` to the ha-mcp dev
# addon's HTTP endpoint INSIDE the booted HAOS instead of using an
# in-process FastMCP server. This is the deployment path real users hit
# when they install the addon + cloudflared on a real HAOS install.
#
# The HAOS_TEST_MODE=inaddon env flips conftest.py's HAOS dispatch:
# refresh_dev_addon_source_in_qcow2 overwrites the addon source (apps/local
# on Supervisor 2026.06.0+, else legacy addons/local) with PR source + bumps
# config.yaml ``version:`` → Supervisor detects an update on next boot →
# trigger_dev_addon_update calls supervisor/api addons/{slug}/update via WS →
# Docker rebuilds with layer cache → addon restarts with PR source →
# mcp_client connects via HTTP transport.
#
# v1 scope: run ONLY tests/src/e2e/haos_only/ (the canary suite) so the
# initial green CI gives us a fast feedback loop. Once the full inaddon
# plumbing is verified, expand to the full src/e2e/ tree (gated by
# external_only / inaddon_only markers).

on:
  # No workflow-level `paths:` filter on purpose. This check is a REQUIRED
  # status check, and a path-filtered workflow that doesn't trigger leaves the
  # required check Pending forever, wedging the merge of any PR that doesn't
  # touch the listed paths. Instead we trigger on every PR and let the
  # `changes` job below decide whether the heavy suite runs: a job skipped via
  # `if:` reports Success to a required check (unlike a workflow-level
  # path-skip, which reports nothing). See the `changes` job for the run/skip
  # rule (skip only pure docs/website; addon + bake inputs always run).
  pull_request:
  workflow_dispatch:
    inputs:
      pytest_args:
        description: 'Extra pytest args (e.g. "-k test_simple_connection") for targeted iteration'
        type: string
        required: false
        default: ''
      pytest_paths:
        description: 'Test paths to run (default: full src/e2e/ — markers handle external_only / inaddon_only skips)'
        type: string
        required: false
        default: 'src/e2e/'
      force_local_build:
        description: 'Build the qcow2 locally even on a cache hit (ignore the cached image)'
        type: boolean
        required: false
        default: false

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.13"
  UV_CACHE_DIR: /tmp/.uv-cache
  LIBGUESTFS_BACKEND: direct

jobs:
  # Gate the heavy suite: run on any code/test/config/addon change, skip ONLY
  # when every changed file is pure docs/website. Skipping happens at the JOB
  # level (via `if:` below) so a skipped run reports Success to the required
  # check; a workflow-level `paths:` skip would instead report nothing and
  # wedge the merge. Add-on + bake-input dirs are baked into the qcow2, so
  # their docs DO affect the suite and always count as code.
  changes:
    name: Detect relevant changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run: ${{ steps.filter.outputs.run }}
    steps:
      - uses: actions/checkout@v7
      - name: Classify changed files
        id: filter
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          # Fail-closed gate: default to RUNNING the suite; skip ONLY when we can
          # prove the PR changed nothing but docs/website. Any classifier failure
          # (non-PR event, base fetch / rev-parse / diff error, empty diff) leaves
          # run=true — branch protection treats a skipped REQUIRED job as passing,
          # so a fail-open classifier could let code merge untested.
          run=true
          if [ "${{ github.event_name }}" = "pull_request" ] \
            && git fetch --depth=1 origin "$BASE_REF" \
            && base_sha=$(git rev-parse "origin/$BASE_REF") \
            && changed=$(git diff --name-only --diff-filter=ACMRD "$base_sha" HEAD) \
            && [ -n "$changed" ]; then
            echo "Changed files:"; printf '%s\n' "$changed" | sed 's/^/  /'
            run=false
            while IFS= read -r f; do
              [ -z "$f" ] && continue
              case "$f" in
                # Markdown docs inside the addon / component dirs are user-facing
                # docs (DOCS.md, README, CHANGELOG), not bake inputs — they don't
                # change what the suite tests, so they skip like any other docs.
                homeassistant-addon/*.md|homeassistant-addon-dev/*.md|homeassistant-addon-webhook-proxy/*.md|custom_components/ha_mcp_tools/*.md)
                  continue ;;
                # Bake inputs / addon dirs are baked into the qcow2 / shipped —
                # their non-doc files change what the suite tests, so they count as code.
                homeassistant-addon/*|homeassistant-addon-dev/*|homeassistant-addon-webhook-proxy/*|custom_components/ha_mcp_tools/*|tests/haos_image_build/*|tests/initial_test_state/*)
                  run=true; break ;;
                # Pure docs / website do not, on their own, warrant the suite.
                *.md|*.mdx|docs/*|site/*)
                  continue ;;
                # Anything else (code, tests, config, workflows, lockfile, ...) runs.
                *)
                  run=true; break ;;
              esac
            done <<< "$changed"
          else
            echo "Non-PR event or unresolved diff — running suite (fail-closed)."
          fi
          echo "run=$run"
          echo "run=$run" >> "$GITHUB_OUTPUT"

  haos-e2e-inaddon:
    name: HAOS E2E Tests (inaddon)
    needs: changes
    # A skipped job reports Success to the required status check (unlike a
    # workflow-level path-skip, which never reports). See the `changes` job.
    if: needs.changes.outputs.run == 'true'
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true
          # Full history so merge-ref git operations resolve cleanly.
          fetch-depth: 0

      - name: Compute image cache key
        id: key
        # Shared with haos-e2e-tests.yml: both lanes consume the same
        # qcow2. The bake (build_image.py::build) unconditionally calls
        # stage_dev_addon_source + install_ha_mcp_dev_addon, so the baked
        # image is already addon-baked and works for both tiers. Inaddon's
        # refresh_dev_addon_source_in_qcow2 overwrites the addon source at
        # test time, so PR-level addon changes don't need to invalidate the
        # cache here.
        run: |
          hash=$(git ls-tree -r HEAD \
            tests/haos_image_build \
            tests/initial_test_state \
            custom_components/ha_mcp_tools \
            homeassistant-addon-webhook-proxy \
            | sha256sum | cut -d' ' -f1 | head -c16)
          echo "cache-key=haos-image-$hash" >> "$GITHUB_OUTPUT"

      - name: Restore image from cache
        id: restore-cache
        uses: actions/cache/restore@v6
        with:
          path: /tmp/haos-test-image.qcow2
          key: ${{ steps.key.outputs.cache-key }}

      - name: Report image-acquisition path
        # Surfaces whether this run restored the (master-primed) Actions
        # cache or falls through to a local build, so the cache-prime's
        # effect is observable in the run summary.
        run: |
          echo "::notice title=HAOS image cache::cache-hit=${{ steps.restore-cache.outputs.cache-hit }} key=${{ steps.key.outputs.cache-key }}"

      - name: Install QEMU + OVMF + libguestfs
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 qemu-utils ovmf xz-utils curl libguestfs-tools sshpass
          sudo chmod +r /boot/vmlinuz-*

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Free disk space for the local build
        # On a cache miss (or a forced rebuild) the qcow2 is built locally;
        # its download (~1.5 GB xz) + decompress (~7 GB qcow2) + boot +
        # addon-install peaks at the edge of the runner's ~14 GB SSD, so
        # prune the ~30 GB of preinstalled tooling the bake does not use.
        # Keep /opt/hostedtoolcache: Python from there is on PATH for
        # build_image.py. See haos-e2e-tests.yml for the full rationale.
        if: steps.restore-cache.outputs.cache-hit != 'true' || github.event.inputs.force_local_build == 'true'
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/share/swift /opt/ghc \
            /usr/local/lib/android /usr/local/.ghcup
          sudo apt-get clean
          docker system prune -af --volumes || true
          df -h /

      - name: Install build-script Python deps (cache miss or forced rebuild)
        if: steps.restore-cache.outputs.cache-hit != 'true' || github.event.inputs.force_local_build == 'true'
        run: pip install -r tests/haos_image_build/requirements.txt

      - name: Build image locally (cache miss or forced rebuild)
        if: steps.restore-cache.outputs.cache-hit != 'true' || github.event.inputs.force_local_build == 'true'
        run: |
          python3 tests/haos_image_build/build_image.py --verbose \
            --output /tmp/haos-test-image.qcow2

      # No cache-save step here on purpose. The external lane
      # (haos-e2e-tests.yml) computes the same cache key (#1407) and
      # always tries to save the same qcow2; both lanes start in
      # parallel on the same PR push, so whichever lost the save race
      # was burning ~25s on a tar+zstd-write of a 12 GB qcow2 that
      # the actions/cache service then refused with
      # "another job may be creating this cache." Letting only the
      # external lane save eliminates the wasted work without
      # changing what gets cached — both lanes still restore from the
      # shared key on the next run.
      #
      # The shared-key bet is safe because both lanes consume the SAME
      # byte-identical qcow2: the cache key hashes the bake-input paths
      # only, so a cache miss builds one qcow2 that the saving lane writes
      # to the shared key for both to restore, and PR-level addon/source
      # overrides happen *in-VM at test time* (see
      # ``refresh_dev_addon_source_in_qcow2`` /
      # ``refresh_recorder_in_qcow2`` in conftest.py) on each
      # worker's per-worker overlay — never on the base qcow2 that
      # gets cached.

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install test dependencies
        run: uv sync --all-extras --dev

      - name: Confirm image present
        run: ls -lh /tmp/haos-test-image.qcow2

      - name: Run inaddon E2E suite
        # HAOS_TEST_MODE=inaddon flips conftest.py's HAOS dispatch into
        # the inaddon branch: addon source is overwritten with PR source
        # before boot, Supervisor update is triggered, mcp_client uses
        # HTTP transport to the addon's MCP endpoint.
        #
        # v1: targets src/e2e/haos_only/ only (canary tier). Widen via
        # workflow_dispatch pytest_paths input once the inaddon plumbing
        # is stable. external_only-marked tests skip automatically.
        #
        # -n2 --dist loadscope: pytest-xdist parallelizes across 2 workers,
        # each booting its own QEMU (per-worker port offset + qcow2 overlay
        # — see _haos_worker_setup in tests/src/e2e/conftest.py). Same
        # rationale as the external HAOS workflow (#1350).
        # Two phases (live-found isolation flaw): addon_disruptive tests
        # self-restart the dev addon, killing any OTHER worker's in-flight
        # MCP call (ClosedResourceError server-side; 300s client hang). The
        # parallel run excludes them; a single-worker phase runs them after,
        # when nothing else can be in flight.
        run: |
          cd tests
          uv run pytest ${{ github.event.inputs.pytest_paths || 'src/e2e/' }} \
            -n2 --dist loadscope -v --tb=short --maxfail=0 \
            -m "not addon_disruptive" ${{ github.event.inputs.pytest_args }}
          uv run pytest ${{ github.event.inputs.pytest_paths || 'src/e2e/' }} \
            -n0 -v --tb=short --maxfail=0 \
            -m addon_disruptive ${{ github.event.inputs.pytest_args }} \
            || { rc=$?; [ "$rc" -eq 5 ] && echo "no disruptive tests in selection"; [ "$rc" -eq 5 ]; }
        env:
          HAMCP_ENV_FILE: "tests/.env.test"
          HAOS_TEST_IMAGE_PATH: /tmp/haos-test-image.qcow2
          HAOS_TEST_MODE: inaddon
          # Feeds conftest's HACS token injection (qcow2 pre-boot edit)
          # so HACS repo adds don't hit the unauthenticated shared-IP
          # GitHub rate limit — the recurring HACS-install flake.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract HAOS + addon diagnostics from booted qcow2 (always)
        if: always()
        run: |
          sudo chmod +r /boot/vmlinuz-* || true
          mkdir -p /tmp/haos-inaddon-diagnostics
          # In pytest-xdist (parallel) mode each worker boots its OWN
          # backing-file overlay (haos-test-image-<worker>.qcow2); the base
          # /tmp/haos-test-image.qcow2 is never booted, so the per-PR source
          # refresh and the HA Core runtime state live on the OVERLAYS, not
          # the base. The overlays persist after the session (the worker
          # fixture registers no teardown unlink), and guestfish reads them
          # through their absolute backing path. Probe every overlay; fall
          # back to the base image only for a single-worker (master) run that
          # mutates it directly. #1594 secondary defect: the old step probed
          # only the un-refreshed base, so the addon-dir / config.yaml checks
          # could never observe the refresh result they claimed to verify.
          shopt -s nullglob
          targets=(/tmp/haos-test-image-gw*.qcow2)
          if [ ${#targets[@]} -eq 0 ]; then
            targets=(/tmp/haos-test-image.qcow2)
          fi
          for img in "${targets[@]}"; do
            label=$(basename "$img" .qcow2)
            outdir=/tmp/haos-inaddon-diagnostics/$label
            mkdir -p "$outdir"
            echo "=== extracting diagnostics from $img ==="
            # /supervisor/homeassistant/.storage state + log files (HA Core).
            guestfish --ro -a "$img" run \
              : mount /dev/sda8 / \
              : ll /supervisor/homeassistant \
              > "$outdir/config-dir-listing.txt" 2>&1 \
              || echo "directory listing failed for $img"
            guestfish --ro -a "$img" run \
              : mount /dev/sda8 / \
              : tar-out /supervisor/homeassistant/.storage "$outdir/storage.tar" \
              || echo ".storage tar-out failed for $img"
            guestfish --ro -a "$img" run \
              : mount /dev/sda8 / \
              : glob copy-out '/supervisor/homeassistant/*.log*' "$outdir/" \
              || echo "log glob copy failed for $img"
            # Addon-specific: capture the dev addon's source dir AND its
            # config.yaml version after refresh, so we can verify the PR source
            # actually landed on the booted overlay. Supervisor 2026.06.0
            # (home-assistant/supervisor#6865) renamed the on-disk local store
            # (addons/local -> apps/local, migrated on boot), so probe BOTH roots;
            # the live one lands, the other no-ops under the || echo guard.
            for store in apps addons; do
              guestfish --ro -a "$img" run \
                : mount /dev/sda8 / \
                : ll "/supervisor/$store/local/ha_mcp_dev" \
                >> "$outdir/addon-dir-listing.txt" 2>&1 \
                || echo "addon dir listing failed for $img ($store/local)"
              guestfish --ro -a "$img" run \
                : mount /dev/sda8 / \
                : copy-out "/supervisor/$store/local/ha_mcp_dev/config.yaml" "$outdir/" \
                || echo "addon config.yaml copy-out failed for $img ($store/local)"
            done
            echo "--- [$label] config dir listing ---"
            cat "$outdir/config-dir-listing.txt" || true
            echo "--- [$label] addon dir listing ---"
            cat "$outdir/addon-dir-listing.txt" || true
            echo "--- [$label] addon config.yaml ---"
            cat "$outdir/config.yaml" || true
          done
          ls -laR /tmp/haos-inaddon-diagnostics/ || true
          # The HACS token injection (conftest pre-boot edit) puts GITHUB_TOKEN
          # into core.config_entries inside the extracted storage.tar files.
          # Redact them (fail-closed: an unredactable tar is deleted) so no
          # credential persists into the downloadable artifact.
          python3 scripts/redact_diagnostics_secrets.py /tmp/haos-inaddon-diagnostics

      - name: Upload HAOS inaddon diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: haos-inaddon-diagnostics
          path: |
            /tmp/haos-inaddon-diagnostics/
            # conftest's finally-block dumps HA Core + Supervisor logs into
            # /tmp/haos-diagnostics; surface those too so we can see why
            # ``addons/{slug}/update`` failed with "unknown error".
            /tmp/haos-diagnostics/
            /tmp/haos-e2e-serial.log
          if-no-files-found: warn
          retention-days: 7
