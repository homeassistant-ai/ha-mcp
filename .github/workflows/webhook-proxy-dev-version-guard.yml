name: Webhook Proxy Dev — Version Guard

on:
  pull_request:
    paths:
      - "homeassistant-addon-webhook-proxy-dev/**"

permissions:
  contents: read

jobs:
  require-version-bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Require a dev version bump and config/manifest parity
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          BASE="origin/$BASE_REF"
          CFG=homeassistant-addon-webhook-proxy-dev/config.yaml
          MAN=homeassistant-addon-webhook-proxy-dev/mcp_proxy_dev/manifest.json

          ver() { python3 - "$@" <<'PY'
          import sys, json, re, pathlib
          p = pathlib.Path(sys.argv[1])
          if p.suffix == ".json":
              print(json.loads(p.read_text())["version"])
          else:
              m = re.search(r'^version:\s*"([^"]+)"', p.read_text(), re.M)
              print(m.group(1) if m else "")
          PY
          }

          NEW_CFG=$(ver "$CFG")
          NEW_MAN=$(ver "$MAN")
          if [ "$NEW_CFG" != "$NEW_MAN" ]; then
            echo "::error::config.yaml ($NEW_CFG) and manifest.json ($NEW_MAN) versions must match"
            exit 1
          fi

          OLD_CFG=$(git show "$BASE:$CFG" 2>/dev/null | python3 -c \
            'import sys,re;m=re.search(r"^version:\s*\"([^\"]+)\"",sys.stdin.read(),re.M);print(m.group(1) if m else "")' || true)
          if [ -z "$OLD_CFG" ]; then
            echo "New dev add-on (no base version) — OK."; exit 0
          fi
          if [ "$NEW_CFG" = "$OLD_CFG" ]; then
            echo "::error::homeassistant-addon-webhook-proxy-dev changed but version is still $NEW_CFG — bump it."
            exit 1
          fi
          python3 - "$OLD_CFG" "$NEW_CFG" <<'PY'
          import re, sys
          def key(v):
              m = re.match(r"^(\d+)\.(\d+)\.(\d+)(?:\.dev(\d+))?$", v)
              if not m:
                  sys.exit(f"::error::unparseable dev version: {v!r}")
              # A release (no .devN) sorts after its pre-releases, so a non-dev
              # version gets an infinitely-high dev component.
              dev = int(m[4]) if m[4] is not None else float("inf")
              return (int(m[1]), int(m[2]), int(m[3]), dev)
          old, new = sys.argv[1], sys.argv[2]
          # The dev add-on version must always carry a .devN pre-release suffix;
          # a stable-looking X.Y.Z would mislabel a dev build as a release.
          if not re.match(r"^\d+\.\d+\.\d+\.dev\d+$", new):
              sys.exit(f"::error::dev add-on version must be X.Y.Z.devN, got {new!r}")
          if key(new) <= key(old):
              print(f"::error::dev version must increase: {old} -> {new}")
              sys.exit(1)
          print(f"dev version bump OK: {old} -> {new}")
          PY
