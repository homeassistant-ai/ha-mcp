name: Webhook Proxy — Stable Guard

# Stable is promote-only: a PR may not edit the stable webhook-proxy add-on
# directly. The only exceptions are the promote workflow's own branches
# (promote-webhook-proxy/*), PRs explicitly tagged `allow-stable-edit`
# (e.g. a stable-only hotfix), and AGENTS.md/CLAUDE.md — the contributor doc
# for both flavors (the dev tree carries only a pointer stub), never touched
# by the promote transform. The exemption is pinned to exactly those two
# paths in their doc shape (regular file + symlink to it); anything else at
# or under those names stays guarded.
on:
  pull_request:
    # Include labeled/unlabeled so adding or removing `allow-stable-edit`
    # re-evaluates the guard on an already-open PR.
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - "homeassistant-addon-webhook-proxy/**"

permissions:
  contents: read
  pull-requests: read

jobs:
  guard-stable-edits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Block direct stable edits outside the promote workflow
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
          PR_LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          set -euo pipefail
          git fetch --quiet origin "$BASE_REF"
          # No `|| true`: a diff error must fail the job (fail closed);
          # --name-only exits 0 whether or not there are changes.
          CHANGED_ALL=$(git diff --name-only "origin/$BASE_REF...HEAD" \
            -- homeassistant-addon-webhook-proxy/)

          # Exempt EXACTLY the two contributor-doc paths (AGENTS.md + its
          # CLAUDE.md symlink): the doc covers both flavors, the promote
          # transform never touches it, and guarding it would force the
          # allow-stable-edit label on pure doc corrections. Exact whole-line
          # match (grep -vxF), NOT a `:(exclude)` pathspec — a pathspec would
          # also exclude the contents of a same-named DIRECTORY, letting
          # `AGENTS.md/anything` slip through unguarded. grep exits 1 when
          # every changed path is exempt; only rc>1 (a real error) fails the
          # job.
          CHANGED=$(printf '%s\n' "$CHANGED_ALL" | grep -vxF \
            -e "homeassistant-addon-webhook-proxy/AGENTS.md" \
            -e "homeassistant-addon-webhook-proxy/CLAUDE.md" \
            || [ "$?" -eq 1 ])

          if [ -z "$CHANGED" ]; then
            # Only the exempt doc paths changed (or nothing did). Pin their
            # shape before trusting the pass: the exemption covers a regular
            # file and a symlink pointing at it — not a swap to code.
            AGENTS_MODE=$(git ls-tree HEAD -- homeassistant-addon-webhook-proxy/AGENTS.md | awk '{print $1}')
            CLAUDE_MODE=$(git ls-tree HEAD -- homeassistant-addon-webhook-proxy/CLAUDE.md | awk '{print $1}')
            CLAUDE_TARGET=$(git cat-file blob HEAD:homeassistant-addon-webhook-proxy/CLAUDE.md 2>/dev/null || true)
            if [ "$AGENTS_MODE" != "100644" ] || [ "$CLAUDE_MODE" != "120000" ] || [ "$CLAUDE_TARGET" != "AGENTS.md" ]; then
              echo "::error::The AGENTS.md/CLAUDE.md exemption applies only while AGENTS.md is a regular file and CLAUDE.md is a symlink to AGENTS.md; this PR changes that shape. Add the 'allow-stable-edit' label if intentional."
              exit 1
            fi
            echo "No guarded changes under the stable add-on dir — nothing to guard."
            exit 0
          fi

          # Exception 1: promote-workflow branches are allowed to edit stable.
          case "$HEAD_REF" in
            promote-webhook-proxy/*)
              echo "Head branch '$HEAD_REF' is a promote branch — stable edits allowed."
              exit 0
              ;;
          esac

          # Exception 2: the PR carries the `allow-stable-edit` label.
          if printf '%s' "$PR_LABELS" \
            | python3 -c 'import json, sys; sys.exit(0 if "allow-stable-edit" in json.load(sys.stdin) else 1)'; then
            echo "PR carries the 'allow-stable-edit' label — stable edits allowed."
            exit 0
          fi

          echo "::error::This PR edits the STABLE webhook-proxy add-on directly:"
          while IFS= read -r f; do
            [ -n "$f" ] && echo "::error::  $f"
          done <<< "$CHANGED"
          echo "::error::Stable is promote-only. Run the 'Webhook Proxy — Promote Dev to"
          echo "::error::Stable' workflow to sync dev -> stable, or add the 'allow-stable-edit'"
          echo "::error::label if this stable-only edit is intentional (e.g. a hotfix)."
          exit 1
