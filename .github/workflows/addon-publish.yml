name: Home Assistant Add-on Publish

on:
  # Called from semver-release.yml after version bump
  workflow_call:
    inputs:
      version:
        description: 'Add-on version to publish'
        required: true
        type: string
  # Also support manual dispatch
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (leave empty to use config.yaml)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}-addon

jobs:
  build-addon:
    name: Build Add-on Image (${{ matrix.arch }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        arch:
          - amd64
          - aarch64
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64

    steps:
    - uses: actions/checkout@v7
      with:
        submodules: true
        # Check out the release tag so uv sync installs the bumped pyproject.toml.
        # Without this, GITHUB_SHA points to the pre-semantic-release merge commit
        # and the installed package metadata would reflect the previous version.
        # Falls back to GITHUB_SHA for manual dispatch without a version input.
        ref: ${{ inputs.version && format('v{0}', inputs.version) || github.sha }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Resolve version
      id: version
      run: |
        if [ -n "${{ inputs.version }}" ]; then
          VERSION="${{ inputs.version }}"
        else
          VERSION=$(grep '^version:' homeassistant-addon/config.yaml | sed 's/version: "\(.*\)"/\1/')
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Add-on version: $VERSION"

    - name: Build and push Docker image
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
      with:
        context: .
        file: ./homeassistant-addon/Dockerfile
        push: true
        platforms: ${{ matrix.platform }}
        tags: |
          ${{ env.IMAGE_PREFIX }}-${{ matrix.arch }}:latest
          ${{ env.IMAGE_PREFIX }}-${{ matrix.arch }}:${{ steps.version.outputs.version }}
        labels: |
          io.hass.name=Home Assistant MCP Server
          io.hass.description=AI assistant integration via Model Context Protocol
          io.hass.version=${{ steps.version.outputs.version }}
          io.hass.type=addon
          io.hass.arch=${{ matrix.arch }}
        cache-from: type=gha,scope=${{ matrix.arch }}
        # ignore-error: cache export is best-effort. Without it, an Actions
        # cache-service failure fails the whole image publish — observed live
        # on v7.12.2: "error writing layer blob: failed to reserve cache"
        # (abandoned upload reservations from a failed attempt block
        # re-reserving the same blob keys, so retries self-perpetuate the
        # failure). A lost cache write only costs the next build a warm start.
        cache-to: type=gha,mode=max,scope=${{ matrix.arch }},ignore-error=true
        build-args: |
          BUILD_VERSION=${{ steps.version.outputs.version }}
          BUILD_ARCH=${{ matrix.arch }}
