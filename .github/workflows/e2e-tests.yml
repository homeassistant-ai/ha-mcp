name: E2E Tests

on:
  push:
    branches: [ main, master ]
    paths:
      # Only run on code changes, not documentation
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'Dockerfile'
      - 'homeassistant-addon/**'
      - '.github/workflows/e2e-tests.yml'
  workflow_dispatch:

# Limit GITHUB_TOKEN permissions to minimum required
permissions:
  contents: read

env:
  PYTHON_VERSION: "3.13"
  UV_CACHE_DIR: /tmp/.uv-cache
  # renovate: datasource=docker depName=ghcr.io/home-assistant/home-assistant
  HA_IMAGE_GHCR: "ghcr.io/home-assistant/home-assistant:2026.6.4"
  # Disable Testcontainers' Ryuk reaper: it has been reported to leave
  # zombie containers on GHA runners (see #366, Ilya0527 2026-05-18).
  # The E2E fixture in tests/src/e2e/conftest.py relies instead on the
  # enclosing ``with container:`` context manager — Python guarantees
  # its ``__exit__`` fires on both normal and exception flows, so the
  # Ryuk safety net is not needed for deterministic cleanup. Refs #366.
  TESTCONTAINERS_RYUK_DISABLED: "true"

jobs:
  # Comprehensive E2E validation for main branch
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v7
      with:
        submodules: true

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
      with:
        cache-binary: true

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "latest"

    - name: Set up Python
      run: uv python install ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: uv sync --all-extras --dev

    - name: Cache HA Docker image
      id: cache-ha-image
      uses: actions/cache@v6
      with:
        path: /tmp/ha-image.tar
        key: ha-image-${{ env.HA_IMAGE_GHCR }}-${{ runner.arch }}

    - name: Load cached HA image
      if: steps.cache-ha-image.outputs.cache-hit == 'true'
      run: docker load -i /tmp/ha-image.tar

    - name: Pull HA image (GHCR → Docker Hub fallback)
      if: steps.cache-ha-image.outputs.cache-hit != 'true'
      run: |
        HA_VERSION="${HA_IMAGE_GHCR##*:}"
        HA_IMAGE_DOCKERHUB="homeassistant/home-assistant:${HA_VERSION}"
        for registry in "$HA_IMAGE_GHCR" "$HA_IMAGE_DOCKERHUB"; do
          echo "Trying $registry..."
          if docker pull "$registry"; then
            if [ "$registry" != "$HA_IMAGE_GHCR" ]; then
              docker tag "$registry" "$HA_IMAGE_GHCR"
            fi
            docker save "$HA_IMAGE_GHCR" -o /tmp/ha-image.tar
            echo "Pulled and cached from $registry"
            exit 0
          fi
          echo "Failed to pull from $registry, trying next..."
          sleep 15
        done
        echo "All registries failed" && exit 1

    - name: Run full E2E test suite
      run: |
        echo "🚀 Running full E2E test suite with 3 workers..."
        uv run pytest tests/src/e2e/ \
          -n3 \
          --dist loadscope \
          --tb=short \
          -v
        echo "✅ Full E2E test suite passed"
      env:
        HAMCP_ENV_FILE: "tests/.env.test"
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Lane 1 of the in-process ha_mcp_server backend (#1527): the SAME full E2E
  # suite, but the server-under-test is the ha_mcp_server integration running
  # in-process inside each worker's testcontainer (E2E_BACKEND=embedded), driven
  # over its ingress webhook. Runs in parallel with the container lane above (a
  # separate job — it does not extend that job's runtime). Only ubuntu-latest for
  # now; the arm64 + HAOS-embedded lanes are follow-ups (kept as clean seams).
  # -n2 (vs the container lane's -n3): each worker additionally builds a ha-mcp
  # wheel and its container preinstalls the fastmcp dependency tree before HA
  # boots, so a lower worker count keeps peak memory + concurrent-pip pressure in
  # check on the 2-vCPU/15GB runner. The larger timeout covers that per-worker
  # preinstall window.
  e2e-tests-embedded:
    name: E2E Tests (Embedded Server)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
    - uses: actions/checkout@v7
      with:
        submodules: true

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
      with:
        cache-binary: true

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "latest"

    - name: Set up Python
      run: uv python install ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: uv sync --all-extras --dev

    - name: Cache HA Docker image
      id: cache-ha-image
      uses: actions/cache@v6
      with:
        path: /tmp/ha-image.tar
        key: ha-image-${{ env.HA_IMAGE_GHCR }}-${{ runner.arch }}

    - name: Load cached HA image
      if: steps.cache-ha-image.outputs.cache-hit == 'true'
      run: docker load -i /tmp/ha-image.tar

    - name: Pull HA image (GHCR → Docker Hub fallback)
      if: steps.cache-ha-image.outputs.cache-hit != 'true'
      run: |
        HA_VERSION="${HA_IMAGE_GHCR##*:}"
        HA_IMAGE_DOCKERHUB="homeassistant/home-assistant:${HA_VERSION}"
        for registry in "$HA_IMAGE_GHCR" "$HA_IMAGE_DOCKERHUB"; do
          echo "Trying $registry..."
          if docker pull "$registry"; then
            if [ "$registry" != "$HA_IMAGE_GHCR" ]; then
              docker tag "$registry" "$HA_IMAGE_GHCR"
            fi
            docker save "$HA_IMAGE_GHCR" -o /tmp/ha-image.tar
            echo "Pulled and cached from $registry"
            exit 0
          fi
          echo "Failed to pull from $registry, trying next..."
          sleep 15
        done
        echo "All registries failed" && exit 1

    - name: Run full E2E test suite (embedded backend)
      run: |
        echo "🚀 Running full E2E suite through the in-process ha_mcp_server (embedded backend)..."
        uv run pytest tests/src/e2e/ \
          -n2 \
          --dist loadscope \
          --tb=short \
          -v
        echo "✅ Full E2E test suite (embedded backend) passed"
      env:
        E2E_BACKEND: "embedded"
        HAMCP_ENV_FILE: "tests/.env.test"
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
