name: Update Add-on Config Version

# Reusable workflow to update addon config.yaml after Docker images are published.
# Called from semver-release.yml, hotfix-release.yml, and addon-publish-dev.yml.
on:
  workflow_call:
    inputs:
      version:
        description: 'Version to set in config.yaml (without v prefix)'
        required: true
        type: string
      config_path:
        description: 'Path to config.yaml to update'
        required: false
        type: string
        default: 'homeassistant-addon/config.yaml'
      commit_message_prefix:
        description: 'Prefix for commit message (e.g., "publish version" or "publish hotfix version")'
        required: false
        type: string
        default: 'publish version'
    secrets:
      RELEASE_APP_ID:
        required: false
      RELEASE_APP_PRIVATE_KEY:
        required: false
      RELEASE_TOKEN:
        required: false

jobs:
  update-addon-config:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Generate GitHub App token with bypass permissions
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
        continue-on-error: true

      - name: Determine push token
        id: token
        run: |
          if [ -n "$APP_TOKEN" ]; then
            echo "value=$APP_TOKEN" >> $GITHUB_OUTPUT
            echo "source=github-app" >> $GITHUB_OUTPUT
          elif [ -n "$RELEASE_TOKEN" ]; then
            echo "value=$RELEASE_TOKEN" >> $GITHUB_OUTPUT
            echo "source=release-pat" >> $GITHUB_OUTPUT
          else
            echo "::error::No push token available. Configure RELEASE_APP_ID/RELEASE_APP_PRIVATE_KEY or RELEASE_TOKEN secret. GITHUB_TOKEN cannot push to protected branches."
            exit 1
          fi
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}

      # persist-credentials: false so the push token is not written into the
      # workspace, where any later step could read it. The version-bump push
      # below re-authenticates explicitly with the token instead. The public
      # repo checkout reads fine with the default token. (#1762)
      - uses: actions/checkout@v7
        with:
          ref: master
          fetch-depth: 1
          persist-credentials: false

      # NOTE: yq runs from the runner's preinstalled binary (ubuntu-latest ships
      # yq 4.x). The previous `mikefarah/yq@master` step was a no-op that only
      # pulled a mutable-ref third-party container into this credentialed job, so
      # it was removed rather than pinned. (#1762)
      - name: Update config.yaml with release version
        env:
          PUSH_TOKEN: ${{ steps.token.outputs.value }}
        run: |
          VERSION="${{ inputs.version }}"
          echo "Updating addon config.yaml to version $VERSION (using token: ${{ steps.token.outputs.source }})"

          CONFIG_PATH="${{ inputs.config_path }}"
          yq -i ".version = \"$VERSION\"" "$CONFIG_PATH"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$CONFIG_PATH"

          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to config.yaml, skipping commit"
          else
            git commit -m "chore(addon): ${{ inputs.commit_message_prefix }} $VERSION [skip ci]"
            git push "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:master
            echo "✓ Updated addon config.yaml to $VERSION"
          fi
