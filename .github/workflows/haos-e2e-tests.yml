name: HAOS E2E Tests

# Runs the HAOS-tier E2E suite for #1281 in parallel with the existing
# testcontainer e2e-tests.yml.
#
# Image resolution strategy (per run):
#   1. Try GitHub Actions cache (keyed on HAOS version + build inputs)
#   2. On a cache miss, build locally (build_image.py) and save to the cache
#
# Single-job design: the qcow2 stays on the runner's local disk through
# build → test, so there's no cross-job upload+download of the ~7 GB image
# (previously cost ~5 min per PR).

on:
  # No workflow-level `paths:` filter on purpose. This check is a REQUIRED
  # status check, and a path-filtered workflow that doesn't trigger leaves the
  # required check Pending forever, wedging the merge of any PR that doesn't
  # touch the listed paths. Instead we trigger on every PR and let the
  # `changes` job below decide whether the heavy suite runs: a job skipped via
  # `if:` reports Success to a required check (unlike a workflow-level
  # path-skip, which reports nothing). See the `changes` job for the run/skip
  # rule (skip only pure docs/website; addon + bake inputs always run).
  pull_request:
  workflow_dispatch:
    inputs:
      pytest_args:
        description: 'Extra pytest args (e.g. "-k test_simple_connection") for targeted iteration'
        type: string
        required: false
        default: ''
      force_local_build:
        description: 'Build the qcow2 locally even on a cache hit (ignore the cached image)'
        type: boolean
        required: false
        default: false

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.13"
  UV_CACHE_DIR: /tmp/.uv-cache
  # libguestfs defaults to libvirt which isn't running on GitHub-hosted
  # runners (per-user libvirtd socket missing for the unprivileged
  # runner UID). Direct backend bypasses libvirt and uses QEMU directly.
  LIBGUESTFS_BACKEND: direct

jobs:
  # Gate the heavy suite: run on any code/test/config/addon change, skip ONLY
  # when every changed file is pure docs/website. Skipping happens at the JOB
  # level (via `if:` below) so a skipped run reports Success to the required
  # check; a workflow-level `paths:` skip would instead report nothing and
  # wedge the merge. Add-on + bake-input dirs are baked into the qcow2, so
  # their docs DO affect the suite and always count as code.
  changes:
    name: Detect relevant changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run: ${{ steps.filter.outputs.run }}
    steps:
      - uses: actions/checkout@v7
      - name: Classify changed files
        id: filter
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          # Fail-closed gate: default to RUNNING the suite; skip ONLY when we can
          # prove the PR changed nothing but docs/website. Any classifier failure
          # (non-PR event, base fetch / rev-parse / diff error, empty diff) leaves
          # run=true — branch protection treats a skipped REQUIRED job as passing,
          # so a fail-open classifier could let code merge untested.
          run=true
          if [ "${{ github.event_name }}" = "pull_request" ] \
            && git fetch --depth=1 origin "$BASE_REF" \
            && base_sha=$(git rev-parse "origin/$BASE_REF") \
            && changed=$(git diff --name-only --diff-filter=ACMRD "$base_sha" HEAD) \
            && [ -n "$changed" ]; then
            echo "Changed files:"; printf '%s\n' "$changed" | sed 's/^/  /'
            run=false
            while IFS= read -r f; do
              [ -z "$f" ] && continue
              case "$f" in
                # Markdown docs inside the addon / component dirs are user-facing
                # docs (DOCS.md, README, CHANGELOG), not bake inputs — they don't
                # change what the suite tests, so they skip like any other docs.
                homeassistant-addon/*.md|homeassistant-addon-dev/*.md|homeassistant-addon-webhook-proxy/*.md|custom_components/ha_mcp_tools/*.md)
                  continue ;;
                # Bake inputs / addon dirs are baked into the qcow2 / shipped —
                # their non-doc files change what the suite tests, so they count as code.
                homeassistant-addon/*|homeassistant-addon-dev/*|homeassistant-addon-webhook-proxy/*|custom_components/ha_mcp_tools/*|tests/haos_image_build/*|tests/initial_test_state/*)
                  run=true; break ;;
                # Pure docs / website do not, on their own, warrant the suite.
                *.md|*.mdx|docs/*|site/*)
                  continue ;;
                # Anything else (code, tests, config, workflows, lockfile, ...) runs.
                *)
                  run=true; break ;;
              esac
            done <<< "$changed"
          else
            echo "Non-PR event or unresolved diff — running suite (fail-closed)."
          fi
          echo "run=$run"
          echo "run=$run" >> "$GITHUB_OUTPUT"

  haos-e2e:
    name: HAOS E2E Tests
    needs: changes
    # A skipped job reports Success to the required status check (unlike a
    # workflow-level path-skip, which never reports). See the `changes` job.
    if: needs.changes.outputs.run == 'true'
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v7
        with:
          # Required for tests/src/e2e/tools/test_skills_resources.py — the
          # skills bundle lives at src/ha_mcp/resources/skills-vendor.
          submodules: true
          # Full history so merge-ref git operations resolve cleanly.
          fetch-depth: 0

      - name: Compute image cache key
        id: key
        # Cache invalidates when ANY input that gets baked into the qcow2
        # changes — build script (addon list / HAOS pin), initial_test_state
        # (seed config + recorder DB + .storage), and the custom components
        # the bake stages into /config. git ls-tree uses object IDs so the
        # hash is reproducible across runs (no mtime noise like `find`
        # would have).
        #
        # INVARIANT: these paths MUST be mirrored by the master-push trigger
        # in build-haos-test-image.yml so the published image stays in step
        # with this cache key. A cache miss now rebuilds locally from the
        # merge-ref rather than serving a stale image. (Regression history:
        # #1374 knx merge broke every open PR's HAOS E2E run until a manual
        # dispatch, back when a miss fell through to a stale GHCR pull.)
        run: |
          hash=$(git ls-tree -r HEAD \
            tests/haos_image_build \
            tests/initial_test_state \
            custom_components/ha_mcp_tools \
            homeassistant-addon-webhook-proxy \
            | sha256sum | cut -d' ' -f1 | head -c16)
          echo "cache-key=haos-image-$hash" >> "$GITHUB_OUTPUT"

      - name: Restore image from cache
        id: restore-cache
        uses: actions/cache/restore@v6
        with:
          path: /tmp/haos-test-image.qcow2
          key: ${{ steps.key.outputs.cache-key }}

      - name: Report image-acquisition path
        # Surfaces whether this run restored the (master-primed) Actions
        # cache or falls through to a local build, so the cache-prime's
        # effect is observable in the run summary.
        run: |
          echo "::notice title=HAOS image cache::cache-hit=${{ steps.restore-cache.outputs.cache-hit }} key=${{ steps.key.outputs.cache-key }}"

      - name: Install QEMU + OVMF + libguestfs
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 qemu-utils ovmf xz-utils curl libguestfs-tools sshpass
          # Ubuntu installs the kernel image as 0600 root:root, but
          # libguestfs's supermin appliance builder needs to read it as
          # the invoking (unprivileged) user. Documented at
          # https://libguestfs.org/guestfs-faq.1.html#kernel-permissions
          # (search "kernel image is not readable") — workaround is to
          # relax perms on /boot/vmlinuz-*.
          sudo chmod +r /boot/vmlinuz-*

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Free disk space for the local build
        # On a cache miss (or a forced rebuild) the qcow2 is built locally;
        # its download (~1.5 GB xz) + decompress (~7 GB qcow2) + boot +
        # addon-install (qcow2 grows to ~12 GB apparent) + ``cp`` to
        # /tmp/haos-test-image.qcow2 peaks at the edge of the runner's
        # ~14 GB SSD, so prune the ~30 GB of preinstalled tooling (dotnet,
        # swift, ghc, android sdk) the bake does not use. Keep
        # ``/opt/hostedtoolcache``: Python from there is on PATH for
        # build_image.py.
        if: steps.restore-cache.outputs.cache-hit != 'true' || github.event.inputs.force_local_build == 'true'
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/share/swift /opt/ghc \
            /usr/local/lib/android /usr/local/.ghcup
          sudo apt-get clean
          docker system prune -af --volumes || true
          df -h /

      - name: Install build-script Python deps (cache miss or forced rebuild)
        if: steps.restore-cache.outputs.cache-hit != 'true' || github.event.inputs.force_local_build == 'true'
        run: pip install -r tests/haos_image_build/requirements.txt

      - name: Build image locally (cache miss or forced rebuild)
        if: steps.restore-cache.outputs.cache-hit != 'true' || github.event.inputs.force_local_build == 'true'
        run: |
          python3 tests/haos_image_build/build_image.py --verbose \
            --output /tmp/haos-test-image.qcow2

      - name: Save image to cache (cache miss only)
        # Save whenever the runtime cache missed so the locally-built
        # qcow2 populates the shared key and future runs restore it
        # instead of rebuilding. This is the sole writer for the shared
        # cache key (#1407 + #1428); the inaddon lane intentionally
        # doesn't save, see the block comment at the same position in
        # ``haos-e2e-inaddon-tests.yml``.
        if: steps.restore-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: /tmp/haos-test-image.qcow2
          key: ${{ steps.key.outputs.cache-key }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install test dependencies
        run: uv sync --all-extras --dev

      - name: Confirm image present
        run: ls -lh /tmp/haos-test-image.qcow2

      - name: Run full E2E suite against HAOS backend
        # HAOS_TEST_IMAGE_PATH switches the e2e/conftest.py dispatch from
        # testcontainer → HAOS-QEMU. Same fixture chain, same test code.
        # haos_only tests under tests/src/e2e/haos_only/ run here; tests
        # that need testcontainer-specific behavior (file mounts, etc.)
        # are marked container_only and skip automatically.
        #
        # -n2 --dist loadscope: pytest-xdist parallelizes across 2 workers,
        # each booting its own QEMU (per-worker port offset + qcow2 overlay
        # — see _haos_worker_setup in tests/src/e2e/conftest.py). loadscope
        # keeps all tests in the same module on the same worker so each
        # worker amortizes its boot cost. 4-vCPU/16-GB runner fits 2x
        # QEMU at -smp 2 -m 4096 each (#1350).
        #
        # --maxfail=0 overrides pytest.ini's --maxfail=3 so we see the full
        # failure surface for triage — early-terminating loses signal.
        run: |
          cd tests
          uv run pytest src/e2e/ -n2 --dist loadscope -v --tb=short --maxfail=0 ${{ github.event.inputs.pytest_args }}
        env:
          HAMCP_ENV_FILE: "tests/.env.test"
          HAOS_TEST_IMAGE_PATH: /tmp/haos-test-image.qcow2
          # Feeds conftest's HACS token injection (qcow2 pre-boot edit)
          # so HACS repo adds don't hit the unauthenticated shared-IP
          # GitHub rate limit — the recurring HACS-install flake.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract HA diagnostics from booted qcow2 (always)
        # First lists what's actually present in /supervisor/homeassistant
        # (so missing files in artifact uploads are diagnosable), then
        # tar-out the whole .storage + log files to a local tarball.
        # Reads-only mount so the qcow2 isn't mutated.
        if: always()
        run: |
          sudo chmod +r /boot/vmlinuz-* || true
          mkdir -p /tmp/haos-diagnostics
          # Probe: full directory listing of HA's config dir. Captures
          # whatever HA actually writes (log filenames vary by config).
          guestfish --ro -a /tmp/haos-test-image.qcow2 run \
            : mount /dev/sda8 / \
            : ll /supervisor/homeassistant \
            > /tmp/haos-diagnostics/config-dir-listing.txt 2>&1 \
            || echo "directory listing failed"
          # Pull everything log-shaped + the .storage tree out as a tar.
          # tar-out includes the full subtree so anything-named-log gets
          # captured; .storage gives us config_entries + other state.
          guestfish --ro -a /tmp/haos-test-image.qcow2 run \
            : mount /dev/sda8 / \
            : tar-out /supervisor/homeassistant/.storage /tmp/haos-diagnostics/storage.tar \
            || echo ".storage tar-out failed"
          # Same for any log files in the config root.
          guestfish --ro -a /tmp/haos-test-image.qcow2 run \
            : mount /dev/sda8 / \
            : glob copy-out '/supervisor/homeassistant/*.log*' /tmp/haos-diagnostics/ \
            || echo "log glob copy failed"
          ls -la /tmp/haos-diagnostics/ || true
          echo '--- config dir listing ---'
          cat /tmp/haos-diagnostics/config-dir-listing.txt || true

      - name: Upload HAOS diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: haos-diagnostics
          path: |
            /tmp/haos-diagnostics/
            /tmp/haos-e2e-serial.log
          if-no-files-found: warn
          retention-days: 7
