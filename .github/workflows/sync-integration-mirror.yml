name: Sync Integration Mirror

# Keeps homeassistant-ai/ha-mcp-integration (the HACS distribution mirror)
# in lockstep: master pushes sync the dev channel (mirror main, plus a
# v<version>-dev.N pre-release tag whenever the snapshot changed the
# component), and a stable release cuts a matching mirror release (stable
# channel). HACS keys on the GitHub prerelease flag, so stable users never
# see dev builds; users who enable the repository's HACS "Pre-release"
# switch entity receive them. The mirror's README
# is composed from a permanent prefix blurb plus the main repo README (with
# relative links/images absolutized) so the HACS page mirrors the main docs.
# The mirror carries no hand-made changes.
#
# The stable-release tagging runs on `workflow_run` after "SemVer Release"
# completes, NOT on the `release` event: the release is created by the
# release-bot App and that `release: published` event does not reliably fan out
# to this workflow, so the mirror never got tagged. This is the same reason
# release-publish.yml uses workflow_run — mirroring that proven trigger here.
permissions:
  contents: read

on:
  push:
    branches: [master]
    paths:
      - "custom_components/ha_mcp_tools/**"
      - "hacs.json"
      - "LICENSE"
      - "README.md"
      - ".github/integration-mirror-readme-prefix.md"
      - "scripts/build_mirror_readme.py"
      - ".github/integration-mirror-workflows/**"
  workflow_run:
    # Both stable-release paths must tag the mirror: a hotfix that bumps the
    # component version otherwise leaves HACS users stuck on the old tag
    # (the push-triggered snapshot copies code to the mirror's main but only
    # this workflow_run leg creates the version tag). The tag step is
    # idempotent (skips when the manifest version is already tagged), so a
    # hotfix without a component change is a harmless no-op.
    workflows: ["SemVer Release", "Hotfix Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      channel:
        description: >-
          stable re-tags the current component version as a full release
          (recovery path when a release run flaked); dev cuts a
          v<version>-dev.N pre-release from the current master snapshot.
        type: choice
        options: [stable, dev]
        default: stable

# Serialize mirror syncs. A real hotfix that touches the component triggers
# BOTH legs — the master push (paths) and the workflow_run — nearly at once,
# and both clone the mirror and push to main; without serialization the second
# push is a non-fast-forward rejection that fails the job before it can tag.
# queue: max keeps a queued release-tag run from being evicted by a later push
# run (requires cancel-in-progress: false).
concurrency:
  group: mirror-sync
  cancel-in-progress: false
  queue: max

jobs:
  # Decide from the TRIGGERING RUN'S JOBS whether a release actually happened.
  # Gating on the run's overall conclusion (the old `if`) skipped the mirror
  # tag whenever any UNRELATED leg failed — observed live on v7.12.2: the
  # addon amd64 image build's cache flake failed the whole Hotfix Release run,
  # this sync never fired, and HACS was left without the component 1.0.3 tag
  # even though semantic-release had pushed the version and tag perfectly.
  # The mirror tag depends only on the "Semantic Release" job (the name both
  # semver-release.yml and hotfix-release.yml use — commented as load-bearing
  # there), so gate on that job's conclusion instead. workflow_run fires for
  # EVERY completed run of the listed workflows; the all-skipped Hotfix
  # Release runs that every non-hotfix PR merge produces conclude "skipped",
  # which never satisfied the old success gate either — the job-level check
  # keeps excluding them (a skipped Semantic Release job is not a release).
  # Push and manual dispatch (where workflow_run is absent) always proceed.
  gate:
    runs-on: ubuntu-latest
    permissions:
      actions: read
    outputs:
      proceed: ${{ steps.decide.outputs.proceed }}
    steps:
      - name: Gate on the Semantic Release job, not the whole run
        id: decide
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" != "workflow_run" ]; then
            echo "Push/dispatch trigger - proceeding."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Fail OPEN on an API error and on a missing job: the snapshot and
          # tag steps are idempotent, so a spurious proceed is harmless, while
          # a suppressed one strands HACS on the old component tag (the bug
          # this gate exists to fix). An absent "Semantic Release" job means
          # the job-name coupling with the release workflows broke (e.g. a
          # rename) — degrade to tagging rather than silently never tagging.
          if ! conclusion=$(gh api \
            "repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/jobs?per_page=100" \
            --jq '[.jobs[] | select(.name == "Semantic Release") | .conclusion] | first // empty'); then
            echo "::warning::Could not query the triggering run's jobs; failing open."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Semantic Release job conclusion: ${conclusion:-<job absent>}"
          case "$conclusion" in
            success)
              echo "proceed=true" >> "$GITHUB_OUTPUT"
              ;;
            "")
              echo "::warning::No 'Semantic Release' job in the triggering run - the job-name coupling with the release workflows may be broken; failing open."
              echo "proceed=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "No successful release in the triggering run - skipping the mirror sync."
              echo "proceed=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

  sync:
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # The release-notes step needs the full stable-tag history
          # (git tag -l 'v*') to find the previous and current server
          # release, not just the default single-commit shallow checkout.
          fetch-depth: 0
          fetch-tags: true

      - name: Set up mirror push key
        env:
          DEPLOY_KEY: ${{ secrets.INTEGRATION_MIRROR_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf -- "%s\n" "$DEPLOY_KEY" > ~/.ssh/mirror_key
          chmod 600 ~/.ssh/mirror_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null

      - name: Clone mirror
        env:
          GIT_SSH_COMMAND: ssh -i ~/.ssh/mirror_key -o IdentitiesOnly=yes
        run: |
          git clone --depth 1 git@github.com:homeassistant-ai/ha-mcp-integration.git /tmp/mirror

      - name: Stage snapshot
        run: |
          rm -rf /tmp/mirror/custom_components
          mkdir -p /tmp/mirror/custom_components
          cp -r custom_components/ha_mcp_tools /tmp/mirror/custom_components/
          rm -rf /tmp/mirror/custom_components/ha_mcp_tools/__pycache__
          cp hacs.json LICENSE /tmp/mirror/
          python3 scripts/build_mirror_readme.py \
            --prefix .github/integration-mirror-readme-prefix.md \
            --readme README.md \
            --out /tmp/mirror/README.md
          # Deploy keys can push workflow files (unlike a PAT, they aren't
          # subject to the `workflow` scope restriction), and the mirror
          # carries no hand-made changes, so its release-on-tag.yml is
          # synced from here too rather than hand-edited in the mirror.
          mkdir -p /tmp/mirror/.github/workflows
          cp .github/integration-mirror-workflows/release-on-tag.yml \
            /tmp/mirror/.github/workflows/release-on-tag.yml

      - name: Commit and push
        id: push
        env:
          GIT_SSH_COMMAND: ssh -i ~/.ssh/mirror_key -o IdentitiesOnly=yes
        run: |
          cd /tmp/mirror
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          # The dev pre-release step keys on component changes specifically:
          # README/LICENSE/workflow-only syncs must not cut a new pre-release.
          if git diff --cached --quiet -- custom_components; then
            echo "component_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "component_changed=true" >> "$GITHUB_OUTPUT"
          fi
          if git diff --cached --quiet; then
            echo "mirror already current"
          else
            git commit -m "Component snapshot from ${GITHUB_REPOSITORY}@${GITHUB_SHA} (${GITHUB_REF_NAME})"
            git push origin main
          fi

      - name: Tag mirror for stable release
        # Tags the mirror with the current component version after a successful
        # SemVer Release (or a manual re-run). The tag is ANNOTATED and its
        # message carries the release notes body: the deploy key can push git
        # refs (including annotated tags) but has no cross-repo GitHub API
        # access to set a release body directly, so the mirror's
        # release-on-tag.yml (synced from
        # .github/integration-mirror-workflows/release-on-tag.yml) reads the
        # tag message and uses it as-is. `--cleanup=verbatim` is required:
        # `git tag -a -F` defaults to `--cleanup=strip`, which silently drops
        # any line starting with "#" -- including the markdown heading the
        # notes script emits. Idempotent: an existing tag no-ops, so a
        # release that did not change the component version simply
        # re-confirms the current tag.
        #
        # No run-conclusion check here: the gate job already decided whether a
        # release happened (checking workflow_run.conclusion again would
        # re-introduce the suppressed-tag bug the gate fixes — an unrelated
        # failed leg fails the RUN even when Semantic Release succeeded). The
        # events that reach this job and must not tag stable are the push-leg
        # code snapshot and a dev-channel dispatch.
        if: >-
          github.event_name == 'workflow_run' ||
          (github.event_name == 'workflow_dispatch' && inputs.channel == 'stable')
        env:
          GIT_SSH_COMMAND: ssh -i ~/.ssh/mirror_key -o IdentitiesOnly=yes
        run: |
          VER=$(python3 -c "import json; print(json.load(open('custom_components/ha_mcp_tools/manifest.json'))['version'])")
          if git -C /tmp/mirror ls-remote --tags origin "refs/tags/v${VER}" | grep -q .; then
            echo "mirror tag v${VER} exists"
            exit 0
          fi
          python3 scripts/build_mirror_release_notes.py \
            --component-version "$VER" \
            --out /tmp/mirror_notes.md
          echo "--- release notes for v${VER} ---"
          cat /tmp/mirror_notes.md
          cd /tmp/mirror
          git tag -a "v${VER}" -F /tmp/mirror_notes.md --cleanup=verbatim
          git push origin "v${VER}"

      - name: Tag mirror dev pre-release
        # Publishes the master component snapshot as a HACS pre-release
        # whenever the component moved past the last stable tag. The mirror's
        # release-on-tag.yml marks -dev. tags with --prerelease, so stable
        # HACS users never see them; dev users opt in via the repository's
        # HACS "Pre-release" switch entity. When the biweekly release later
        # tags the bare v<version>, HACS's newest-first release scan puts
        # everyone - including pre-release users - back on the stable build.
        #
        # The dev tag MUST NOT be the bare v<version>: the stable tag step
        # above is idempotent and would skip on the existing tag, leaving the
        # version permanently marked pre-release. run_number keeps successive
        # dev builds of one version ordered and unique; a re-run of the same
        # run number hits the existing-tag check and no-ops.
        if: >-
          (github.event_name == 'push' && steps.push.outputs.component_changed == 'true') ||
          (github.event_name == 'workflow_dispatch' && inputs.channel == 'dev')
        env:
          GIT_SSH_COMMAND: ssh -i ~/.ssh/mirror_key -o IdentitiesOnly=yes
        run: |
          VER=$(python3 -c "import json; print(json.load(open('custom_components/ha_mcp_tools/manifest.json'))['version'])")
          # A bare v<VER> tag means master hasn't bumped the component since
          # the last stable release, so there is nothing dev-only to publish:
          # a v<VER>-dev.N tag would hide behind the stable release in HACS's
          # newest-first scan. Component changes are required to bump
          # manifest.json in the same PR (AGENTS.md "Custom Component").
          if git -C /tmp/mirror ls-remote --tags origin "refs/tags/v${VER}" | grep -q .; then
            echo "v${VER} is already released as stable - skipping dev tag"
            exit 0
          fi
          TAG="v${VER}-dev.${{ github.run_number }}"
          if git -C /tmp/mirror ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
            echo "mirror tag ${TAG} exists"
            exit 0
          fi
          {
            echo "## HA-MCP Custom Component ${VER} (development pre-release)"
            echo
            echo "Snapshot of the custom component from" \
              "${GITHUB_REPOSITORY}@${GITHUB_SHA}, ahead of the latest stable" \
              "release. New features in this build may require a newer server" \
              "and only become fully usable with the next stable release."
            echo
            echo "You receive these builds because the HACS **Pre-release**" \
              "switch is enabled for this repository; turn it off to stay on" \
              "stable releases."
          } > /tmp/dev_notes.md
          cd /tmp/mirror
          git tag -a "${TAG}" -F /tmp/dev_notes.md --cleanup=verbatim
          git push origin "${TAG}"
