name: Webhook Proxy — Reset Dev from Stable

# Manual reset: overwrite the dev add-on with the current stable code
# (forward-rename mcp_proxy -> mcp_proxy_dev, restore dev identity, swap the
# DOCS.md flavor banner) and set a strictly-increasing dev version. Opens a
# draft PR.
on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  reset-dev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.13"

      - name: Install ruff + pytest
        run: pip install ruff pytest pytest-asyncio pytest-timeout

      - name: Run the reset transform in place
        id: reset
        run: |
          set -euo pipefail
          NEW=$(python3 scripts/webhook_proxy_sync.py --direction reset)
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "New dev version: $NEW"

      # The committed-tree drift guards are sync-point invariants: they skip in
      # per-PR CI (dev intentionally runs ahead of stable between promotes) and
      # run HERE, right after the transform, as its acceptance gate.
      - name: Verify transform exactness (drift guards)
        env:
          WEBHOOK_PROXY_TREES_SYNCED: "1"
        run: python3 -m pytest tests/src/unit/test_webhook_proxy_sync.py -q

      - name: Commit on a branch and open a draft PR
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_REF: ${{ github.ref_name }}
          NEW_VERSION: ${{ steps.reset.outputs.version }}
        run: |
          set -euo pipefail
          BRANCH="reset-webhook-proxy-dev/$NEW_VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add homeassistant-addon-webhook-proxy-dev/
          git commit -m "chore(addon-dev): reset dev from stable ($NEW_VERSION)"
          git push -u origin "$BRANCH"
          cat > "$RUNNER_TEMP/pr-body.md" <<EOF
          Generated by the \`webhook-proxy-reset-dev\` workflow (\`workflow_dispatch\`).

          It overwrote the dev add-on with the current stable code,
          forward-renamed \`mcp_proxy\` -> \`mcp_proxy_dev\`, restored the dev
          mutual-exclusion constants, and set the dev version to \`$NEW_VERSION\`
          (always strictly increasing).

          The transform syncs code + identity + version + \`DOCS.md\` (component
          token rename plus the flavor-banner swap). \`CHANGELOG.md\` and the
          contributor docs are intentionally left untouched — give them a
          manual look before merging.
          EOF
          gh pr create --draft --base "$BASE_REF" --head "$BRANCH" \
            --title "chore(addon-dev): reset dev from stable ($NEW_VERSION)" \
            --body-file "$RUNNER_TEMP/pr-body.md"
