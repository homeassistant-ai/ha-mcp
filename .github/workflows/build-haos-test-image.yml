name: Build HAOS Test Image (Publish to GHCR)

# Publishes the pre-baked HAOS qcow2 used by haos-e2e-tests.yml — see #1281.
# Outputs an OCI artifact at ghcr.io/<owner>/haos-test-image:<HAOS-VERSION>-<short-sha>
# plus a moving :<HAOS-VERSION>-latest tag the e2e workflow pulls from.
#
# PR-time builds happen inside haos-e2e-tests.yml itself (with caching);
# this workflow only runs to publish stable tags after merge to master.
#
# Triggered on: manual dispatch, weekly cron (refreshes addon Docker layers),
# and push to master that touches any input baked into the qcow2.
#
# INVARIANT — the path triggers below MUST mirror the ``git ls-tree`` paths
# that haos-e2e-tests.yml hashes into its image cache key (see the
# "Compute image cache key" step). When master commits change a baked
# input that isn't listed here, GHCR stays at the previous SHA and every
# subsequent PR that doesn't itself touch a bake input pulls the stale
# image — which is exactly how the #1374 (knx allowlist) merge broke
# every open PR's HAOS E2E run until a manual dispatch. Keep both lists
# in sync.

on:
  workflow_dispatch:
    inputs:
      tag_suffix:
        description: >-
          Moving-tag suffix (default: ``latest``). Override to publish
          to ``:HAOS_VERSION-<suffix>`` instead of ``:HAOS_VERSION-latest``
          — used by perf-iteration branches that need a non-latest tag
          they can point the e2e test workflows at without touching the
          master-served image. Pointing the e2e lanes at the override is
          a SEPARATE manual edit on the branch: change the ``tag=`` line
          in the ``Try pulling from GHCR`` step of both
          ``haos-e2e-tests.yml`` and ``haos-e2e-inaddon-tests.yml``.
          Allowed character set is ``[A-Za-z0-9._-]+`` (OCI tag rules);
          the ``Push image to GHCR`` step validates and fails fast on
          anything else.
        type: string
        required: false
        default: 'latest'
  push:
    branches: [master]
    paths:
      # Bake inputs — must match haos-e2e-tests.yml cache-key paths.
      - 'tests/haos_image_build/**'
      - 'tests/initial_test_state/**'
      - 'custom_components/ha_mcp_tools/**'
      - 'homeassistant-addon-webhook-proxy/**'
      - 'homeassistant-addon-dev/**'
      # The workflow itself — bumping the build script or env triggers a republish.
      - '.github/workflows/build-haos-test-image.yml'
  schedule:
    # Weekly Monday 06:00 UTC — keeps the image current with addon updates
    # even when nothing in this repo changes.
    - cron: '0 6 * * 1'

permissions:
  contents: read
  packages: write

env:
  IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/haos-test-image
  # libguestfs defaults to libvirt which isn't running on GitHub-hosted
  # runners (per-user libvirtd socket missing for the unprivileged
  # runner UID). Direct backend bypasses libvirt and uses QEMU directly.
  # Same setting as haos-e2e-tests.yml; the bake_test_state step added in
  # #1326 shells out to guestfish and would otherwise hang trying to talk
  # to libvirt.
  LIBGUESTFS_BACKEND: direct

jobs:
  build:
    name: Build HAOS qcow2
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6
        with:
          # Required for tests/src/e2e/tools/test_skills_resources.py — the
          # skills bundle lives at src/ha_mcp/resources/skills-vendor. Kept
          # in parity with haos-e2e-tests.yml even though the publish bake
          # itself doesn't touch the submodule, so the two checkout shapes
          # don't drift.
          submodules: true

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 qemu-utils ovmf xz-utils curl libguestfs-tools
          # Ubuntu installs the kernel image as 0600 root:root, but
          # libguestfs's supermin appliance builder needs to read it.
          # See https://libguestfs.org/guestfs-faq.1.html#kernel-permissions
          sudo chmod +r /boot/vmlinuz-*

      - name: Enable KVM group perms
        # Same udev trick used by home-assistant/operating-system's test workflow:
        # makes /dev/kvm world-accessible so the unprivileged runner can use it.
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Confirm KVM is usable
        run: |
          ls -l /dev/kvm
          test -w /dev/kvm

      - name: Extract pinned HAOS version
        id: haos_version
        run: |
          version=$(python3 -c "from tests.haos_image_build.build_image import HAOS_VERSION; print(HAOS_VERSION)")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install build-script Python deps
        run: pip install -r tests/haos_image_build/requirements.txt

      - name: Build image
        run: python3 tests/haos_image_build/build_image.py --verbose --output haos-test-image.qcow2

      - name: Extract publish-build diagnostics (always)
        # On build failure (boot timeout, onboarding rejection, addon
        # install error, bake step crash) Python's stdout via --verbose
        # is the only signal otherwise. Grab the serial log + a
        # post-mortem of the intermediate qcow2's /config dir so a
        # future failure can be triaged without re-running locally.
        # Tolerates missing files because the failure may be before
        # boot (no serial yet) or before bake (no /config yet).
        if: always()
        run: |
          sudo chmod +r /boot/vmlinuz-* || true
          mkdir -p /tmp/haos-publish-diagnostics
          intermediate=/tmp/haos-build/haos-test-image.qcow2
          if [ -f "$intermediate" ]; then
            guestfish --ro -a "$intermediate" run \
              : mount /dev/sda8 / \
              : ll /supervisor/homeassistant \
              > /tmp/haos-publish-diagnostics/config-dir-listing.txt 2>&1 \
              || echo "directory listing failed (qcow2 may not be baked yet)"
            guestfish --ro -a "$intermediate" run \
              : mount /dev/sda8 / \
              : tar-out /supervisor/homeassistant/.storage \
                /tmp/haos-publish-diagnostics/storage.tar \
              || echo ".storage tar-out failed"
          else
            echo "intermediate qcow2 not present — build failed before bake" \
              > /tmp/haos-publish-diagnostics/no-qcow2.txt
          fi
          # build_image.start_qemu writes the serial log to <work_dir>/
          # haos-serial.log (default work_dir = /tmp/haos-build); copy
          # it out for upload.
          cp /tmp/haos-build/haos-serial.log /tmp/haos-publish-diagnostics/ \
            2>/dev/null || true
          ls -la /tmp/haos-publish-diagnostics/ || true

      - name: Upload publish-build diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: haos-publish-diagnostics-${{ github.sha }}
          path: /tmp/haos-publish-diagnostics/
          if-no-files-found: warn
          retention-days: 14

      - name: Compress qcow2 in-format (qemu-img convert -c)
        # Re-pack the qcow2 with qcow2-native zlib *cluster* compression
        # before upload. The post-bake file is ~12 GB *apparent* size on
        # disk — sparse, with ~5 GB actually allocated; the rest is
        # un-allocated holes from ``qemu-img resize 32G`` in
        # ``fetch_haos_qcow2``. ORAS pushes/pulls
        # ``application/octet-stream`` as a raw byte stream, so the
        # sparse holes get serialised over the wire as actual zero bytes
        # — the *apparent* size, not the allocated size, is what GHCR
        # pull pays for.
        #
        # ``qemu-img convert -c -O qcow2`` re-encodes the data densely
        # at the cluster level (default 64 KiB). The output stays a
        # standard qcow2 (same OCI media-type, same consumer code path);
        # QEMU decompresses clusters on-demand during VM I/O when the
        # e2e workflow boots, so no upfront decompress step on the pull
        # side. Trade-off worth knowing about: qcow2 cluster compression
        # is read-only — the first write to any compressed cluster makes
        # QEMU re-allocate it uncompressed in place. The e2e workflow's
        # boot is read-heavy (HA starts, recorder DB rebuilds, addon
        # containers come up), so write-side re-allocation cost is small
        # relative to the pull-time saved, but it's why this convert
        # pass lives at publish time and not at every consumer.
        #
        # Measured at publish run 26361263298 step 11:
        #   12 GB → 5.1 GB (2.3x ratio), convert pass took 6m 15s.
        # First e2e run that consumed the result (runs 26361656780 +
        # 26361656754) saw GHCR pull drop from ~6 min (uncompressed
        # baseline) to 47–58 s.
        #
        # Cost: the convert pass adds ~6 min to the publish runner —
        # paid only on master push / weekly cron / manual dispatch,
        # not on PR runs.
        run: |
          orig_bytes=$(stat -c%s haos-test-image.qcow2)
          qemu-img convert -c -O qcow2 \
            haos-test-image.qcow2 haos-test-image.qcow2.compressed
          mv haos-test-image.qcow2.compressed haos-test-image.qcow2
          # Integrity gate before consumers see the file: catch torn
          # writes (e.g. ``qemu-img convert`` killed mid-run after the
          # output file already exists, exit-0 from the shell wrapper
          # but file is truncated) and broken refcount tables.
          # ``qemu-img check`` reads metadata + L1/L2 tables only — it
          # does not stream the full image — so this is fast.
          qemu-img check haos-test-image.qcow2
          new_bytes=$(stat -c%s haos-test-image.qcow2)
          # Sanity floor: the baked HAOS image is gigabytes; anything
          # under 1 GiB after compress is corruption ``qemu-img check``
          # didn't catch. Fail before the moving tag points at bad bytes.
          if [ "$new_bytes" -lt 1073741824 ]; then
            echo "::error::compressed qcow2 suspiciously small: ${new_bytes} bytes"
            exit 1
          fi
          ratio=$(awk -v o="$orig_bytes" -v n="$new_bytes" 'BEGIN{printf "%.1f", o/n}')
          echo "qcow2 size before: $(numfmt --to=iec "$orig_bytes")"
          echo "qcow2 size after : $(numfmt --to=iec "$new_bytes")"
          echo "compression ratio: ${ratio}x"

      - name: Upload built image as workflow artifact
        # Always upload — even on PRs that don't push to GHCR — so reviewers
        # can pull the artifact and verify locally. (Now also smaller thanks
        # to the in-format compression step above.)
        uses: actions/upload-artifact@v7
        with:
          name: haos-test-image-${{ steps.haos_version.outputs.version }}-${{ github.sha }}
          path: haos-test-image.qcow2
          retention-days: 14
          if-no-files-found: error

      - name: Set up oras
        uses: oras-project/setup-oras@v2

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push image to GHCR
        env:
          HAOS_VERSION: ${{ steps.haos_version.outputs.version }}
          SHORT_SHA: ${{ github.sha }}
          # See the ``tag_suffix`` workflow_dispatch input at the top of
          # this file for the override semantics and required edits on
          # the consumer side. The ``|| 'latest'`` fallback covers the
          # ``push:`` / ``schedule:`` triggers where
          # ``github.event.inputs`` is null.
          TAG_SUFFIX: ${{ github.event.inputs.tag_suffix || 'latest' }}
        run: |
          # Validate the suffix against the OCI tag character set before
          # building any tag strings — a typo like ``foo/bar``,
          # ``:evil``, or a trailing space would otherwise surface as a
          # confusing ``oras push`` error ten lines later.
          if [[ ! "$TAG_SUFFIX" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "::error::TAG_SUFFIX must match [A-Za-z0-9._-]+ (OCI tag chars), got: '$TAG_SUFFIX'"
            exit 1
          fi
          short_sha="${SHORT_SHA:0:7}"
          versioned="${IMAGE_REPO}:${HAOS_VERSION}-${short_sha}"
          moving="${IMAGE_REPO}:${HAOS_VERSION}-${TAG_SUFFIX}"
          oras push "$versioned" \
            --artifact-type application/vnd.homeassistant-ai.haos-test-image.v1 \
            haos-test-image.qcow2:application/octet-stream
          oras tag "$versioned" "${HAOS_VERSION}-${TAG_SUFFIX}"
          echo "Pushed $versioned"
          echo "Pushed $moving"
