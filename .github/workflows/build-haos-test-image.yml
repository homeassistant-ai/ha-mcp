name: Build HAOS Test Image

# Builds the pre-baked HAOS qcow2 used by haos-e2e-tests.yml — see #1281.
# Outputs an OCI artifact at ghcr.io/homeassistant-ai/haos-test-image:<HAOS-VERSION>-<short-sha>
# plus a moving :<HAOS-VERSION>-latest tag the e2e workflow pulls from.
#
# Triggered on: manual dispatch, Renovate PR that bumps HAOS_VERSION, and any
# push to master that touches the build script itself.

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'tests/haos_image_build/**'
      - '.github/workflows/build-haos-test-image.yml'
  pull_request:
    paths:
      - 'tests/haos_image_build/**'
      - '.github/workflows/build-haos-test-image.yml'

permissions:
  contents: read
  packages: write

env:
  IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/haos-test-image

jobs:
  build:
    name: Build HAOS qcow2
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 qemu-utils ovmf xz-utils curl

      - name: Enable KVM group perms
        # Same udev trick used by home-assistant/operating-system's test workflow:
        # makes /dev/kvm world-accessible so the unprivileged runner can use it.
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Confirm KVM is usable
        run: |
          ls -l /dev/kvm
          test -w /dev/kvm

      - name: Extract pinned HAOS version
        id: haos_version
        run: |
          version=$(python3 -c "from tests.haos_image_build.build_image import HAOS_VERSION; print(HAOS_VERSION)")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: python3 tests/haos_image_build/build_image.py --verbose --output haos-test-image.qcow2.xz

      - name: Upload built image as workflow artifact
        # Always upload — even on PRs that don't push to GHCR — so reviewers
        # can pull the artifact and verify locally.
        uses: actions/upload-artifact@v5
        with:
          name: haos-test-image-${{ steps.haos_version.outputs.version }}-${{ github.sha }}
          path: haos-test-image.qcow2.xz
          retention-days: 14
          if-no-files-found: error

      - name: Set up oras
        if: github.event_name != 'pull_request'
        uses: oras-project/setup-oras@v1

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push image to GHCR
        if: github.event_name != 'pull_request'
        env:
          HAOS_VERSION: ${{ steps.haos_version.outputs.version }}
          SHORT_SHA: ${{ github.sha }}
        run: |
          short_sha="${SHORT_SHA:0:7}"
          versioned="${IMAGE_REPO}:${HAOS_VERSION}-${short_sha}"
          moving="${IMAGE_REPO}:${HAOS_VERSION}-latest"
          oras push "$versioned" \
            --artifact-type application/vnd.homeassistant-ai.haos-test-image.v1 \
            haos-test-image.qcow2.xz:application/x-xz
          oras tag "$versioned" "${HAOS_VERSION}-latest"
          echo "Pushed $versioned"
          echo "Pushed $moving"
