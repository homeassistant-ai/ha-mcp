name: Build HAOS Test Image (Prime Shared Cache)

# Bakes the pre-baked HAOS qcow2 used by haos-e2e-tests.yml — see #1281.
# The workflow's job on master is to local-build the qcow2 and warm the shared
# Actions cache; the lanes restore from that cache and local-build on a miss.
# The PR-time job uploads the qcow2 as a workflow artifact so reviewers can
# sanity-check (e.g. on a Renovate HAOS-version bump PR) without re-running
# the bake locally.
#
# Triggered on: manual dispatch, weekly cron (refreshes addon Docker layers),
# and push to master that touches any input baked into the qcow2.
#
# INVARIANT — the path triggers below MUST mirror the ``git ls-tree`` paths
# that haos-e2e-tests.yml hashes into its image cache key (see the
# "Compute image cache key" step). When master commits change a baked
# input that isn't listed here, the master cache-prime stays at the
# previous state and every subsequent PR on a cache miss builds locally
# (rather than restoring the master-primed cache), which adds ~25 min
# to the PR run. This was how the #1374 (knx allowlist) merge forced
# every open PR to rebuild until a manual dispatch refreshed master.
# Keep both lists in sync.

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      # Bake inputs — must match haos-e2e-tests.yml cache-key paths.
      - 'tests/haos_image_build/**'
      - 'tests/initial_test_state/**'
      - 'custom_components/ha_mcp_tools/**'
      - 'homeassistant-addon-webhook-proxy/**'
      - 'homeassistant-addon-dev/**'
      # The workflow itself — bumping the build script or env triggers a republish.
      - '.github/workflows/build-haos-test-image.yml'
  schedule:
    # Weekly Monday 06:00 UTC — keeps the image current with addon updates
    # even when nothing in this repo changes.
    - cron: '0 6 * * 1'

permissions:
  contents: read

env:
  # libguestfs defaults to libvirt which isn't running on GitHub-hosted
  # runners (per-user libvirtd socket missing for the unprivileged
  # runner UID). Direct backend bypasses libvirt and uses QEMU directly.
  # Same setting as haos-e2e-tests.yml; the bake_test_state step added in
  # #1326 shells out to guestfish and would otherwise hang trying to talk
  # to libvirt.
  LIBGUESTFS_BACKEND: direct

jobs:
  build:
    name: Build HAOS qcow2
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6
        with:
          # Required for the bake's submodules: the skills bundle at
          # src/ha_mcp/resources/skills-vendor (test_skills_resources.py) AND
          # the vendored Puppet add-on at
          # tests/haos_image_build/vendor/home-assistant-addons, which
          # stage_puppet_addon_source bakes into the qcow2 (it hard-fails
          # without the submodule checked out).
          submodules: true

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 qemu-utils ovmf xz-utils curl libguestfs-tools
          # Ubuntu installs the kernel image as 0600 root:root, but
          # libguestfs's supermin appliance builder needs to read it.
          # See https://libguestfs.org/guestfs-faq.1.html#kernel-permissions
          sudo chmod +r /boot/vmlinuz-*

      - name: Enable KVM group perms
        # Same udev trick used by home-assistant/operating-system's test workflow:
        # makes /dev/kvm world-accessible so the unprivileged runner can use it.
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Confirm KVM is usable
        run: |
          ls -l /dev/kvm
          test -w /dev/kvm

      - name: Extract pinned HAOS version
        id: haos_version
        run: |
          version=$(python3 -c "from tests.haos_image_build.build_image import HAOS_VERSION; print(HAOS_VERSION)")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install build-script Python deps
        run: pip install -r tests/haos_image_build/requirements.txt

      - name: Free disk space for the bake
        # The publish always local-builds the qcow2, so it hits the same disk
        # peak the e2e local-build path guards against. The Puppet (Chromium)
        # add-on is the largest and last build, so it is the first to trip the
        # runner's ~14 GB SSD: the e2e lanes build Puppet fine with this exact
        # prune, while the publish (which lacked it) failed at the Puppet
        # build. The df -h bookends make the reclaimed headroom visible. Keep
        # /opt/hostedtoolcache: Python from there is on PATH for build_image.py.
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/share/swift /opt/ghc \
            /usr/local/lib/android /usr/local/.ghcup
          sudo apt-get clean
          docker system prune -af --volumes || true
          df -h /

      - name: Build image
        run: python3 tests/haos_image_build/build_image.py --verbose --output haos-test-image.qcow2

      - name: Extract publish-build diagnostics (always)
        # On build failure (boot timeout, onboarding rejection, addon
        # install error, bake step crash) Python's stdout via --verbose
        # is the only signal otherwise. Grab the serial log + a
        # post-mortem of the intermediate qcow2's /config dir so a
        # future failure can be triaged without re-running locally.
        # Tolerates missing files because the failure may be before
        # boot (no serial yet) or before bake (no /config yet).
        if: always()
        run: |
          sudo chmod +r /boot/vmlinuz-* || true
          mkdir -p /tmp/haos-publish-diagnostics
          intermediate=/tmp/haos-build/haos-test-image.qcow2
          if [ -f "$intermediate" ]; then
            guestfish --ro -a "$intermediate" run \
              : mount /dev/sda8 / \
              : ll /supervisor/homeassistant \
              > /tmp/haos-publish-diagnostics/config-dir-listing.txt 2>&1 \
              || echo "directory listing failed (qcow2 may not be baked yet)"
            guestfish --ro -a "$intermediate" run \
              : mount /dev/sda8 / \
              : tar-out /supervisor/homeassistant/.storage \
                /tmp/haos-publish-diagnostics/storage.tar \
              || echo ".storage tar-out failed"
          else
            echo "intermediate qcow2 not present — build failed before bake" \
              > /tmp/haos-publish-diagnostics/no-qcow2.txt
          fi
          # build_image.start_qemu writes the serial log to <work_dir>/
          # haos-serial.log (default work_dir = /tmp/haos-build); copy
          # it out for upload.
          cp /tmp/haos-build/haos-serial.log /tmp/haos-publish-diagnostics/ \
            2>/dev/null || true
          ls -la /tmp/haos-publish-diagnostics/ || true

      - name: Upload publish-build diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: haos-publish-diagnostics-${{ github.sha }}
          path: /tmp/haos-publish-diagnostics/
          if-no-files-found: warn
          retention-days: 14

      - name: Compress qcow2 in-format (qemu-img convert -c)
        # Re-pack the qcow2 with qcow2-native zlib *cluster* compression
        # before the artifact upload + shared-cache save below. The
        # post-bake file is ~12 GB *apparent* size on disk — sparse, with
        # ~5 GB actually allocated; the rest is un-allocated holes from
        # ``qemu-img resize 32G`` in ``fetch_haos_qcow2``. Both the
        # Actions artifact upload and the Actions cache save serialise
        # the file as a raw byte stream, so the sparse holes go over the
        # wire as actual zero bytes — the *apparent* size, not the
        # allocated size, is what storage + network pay for. The cache
        # cap (10 GiB per repo) is the binding constraint: an
        # uncompressed qcow2 LRU-evicts the cache much faster than the
        # compressed one.
        #
        # ``qemu-img convert -c -O qcow2`` re-encodes the data densely
        # at the cluster level (default 64 KiB). The output stays a
        # standard qcow2 (same consumer code path); QEMU decompresses
        # clusters on-demand during VM I/O when the e2e workflow boots,
        # so no upfront decompress step on the consumer side.
        # Trade-off worth knowing about: qcow2 cluster compression is
        # read-only — the first write to any compressed cluster makes
        # QEMU re-allocate it uncompressed in place. The e2e workflow's
        # boot is read-heavy (HA starts, recorder DB rebuilds, addon
        # containers come up), so write-side re-allocation cost is small
        # relative to the cache-restore time saved, but it's why this
        # convert pass lives at bake time and not at every consumer.
        #
        # Measured at run 26361263298 step 11:
        #   12 GB → 5.1 GB (2.3x ratio), convert pass took 6m 15s.
        # First e2e run that consumed the compressed result (runs
        # 26361656780 + 26361656754) saw the image-acquisition step drop
        # from ~6 min (uncompressed baseline) to 47–58 s.
        #
        # Cost: the convert pass adds ~6 min to the bake runner —
        # paid only on master push / weekly cron / manual dispatch,
        # not on PR runs.
        run: |
          orig_bytes=$(stat -c%s haos-test-image.qcow2)
          qemu-img convert -c -O qcow2 \
            haos-test-image.qcow2 haos-test-image.qcow2.compressed
          mv haos-test-image.qcow2.compressed haos-test-image.qcow2
          # Integrity gate before consumers see the file: catch torn
          # writes (e.g. ``qemu-img convert`` killed mid-run after the
          # output file already exists, exit-0 from the shell wrapper
          # but file is truncated) and broken refcount tables.
          # ``qemu-img check`` reads metadata + L1/L2 tables only — it
          # does not stream the full image — so this is fast.
          qemu-img check haos-test-image.qcow2
          new_bytes=$(stat -c%s haos-test-image.qcow2)
          # Sanity floor: the baked HAOS image is gigabytes; anything
          # under 1 GiB after compress is corruption ``qemu-img check``
          # didn't catch. Fail before the shared cache stores bad bytes.
          if [ "$new_bytes" -lt 1073741824 ]; then
            echo "::error::compressed qcow2 suspiciously small: ${new_bytes} bytes"
            exit 1
          fi
          ratio=$(awk -v o="$orig_bytes" -v n="$new_bytes" 'BEGIN{printf "%.1f", o/n}')
          echo "qcow2 size before: $(numfmt --to=iec "$orig_bytes")"
          echo "qcow2 size after : $(numfmt --to=iec "$new_bytes")"
          echo "compression ratio: ${ratio}x"

      - name: Upload built image as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: haos-test-image-${{ steps.haos_version.outputs.version }}-${{ github.sha }}
          path: haos-test-image.qcow2
          retention-days: 14
          if-no-files-found: error

      # --- Warm the shared Actions cache (master only) -----------------------
      # The E2E lanes (haos-e2e-tests.yml / haos-e2e-inaddon-tests.yml) restore
      # the qcow2 from the Actions cache and fall back to a local build on a
      # miss. Saving the image here, on the default branch, lets PR runs restore
      # it via GitHub's default-branch cache scope and skip the local build.
      # Purely additive: on a miss/eviction the lanes fall back to a local build
      # exactly as before (#1515).
      - name: Compute E2E image cache key (master only)
        id: e2e_cache_key
        if: github.ref == 'refs/heads/master'
        continue-on-error: true
        # INVARIANT: this git ls-tree must stay byte-IDENTICAL to the
        # "Compute image cache key" step in BOTH haos-e2e-tests.yml and
        # haos-e2e-inaddon-tests.yml — otherwise this warms a key the lanes
        # never restore (a wasted prime, not a stale test: the lanes still
        # recompute their own correct key). NOTE the push-trigger paths above
        # are a deliberate SUPERSET (they also list homeassistant-addon-dev/**
        # + this file), NOT an identical mirror — keep that distinction in mind
        # when editing.
        run: |
          # Position the qcow2 at the exact path the lanes restore to FIRST, so
          # the cache-key output below is set only once the file is in place
          # (the save step guards on a non-empty cache-key, so a failed move
          # leaves the key empty and skips the save). On GitHub-hosted runners
          # /tmp and the workspace share the root filesystem, so this is a
          # rename, not a copy. The artifact upload above already consumed
          # the workspace copy, so nothing later needs it.
          mv haos-test-image.qcow2 /tmp/haos-test-image.qcow2
          hash=$(git ls-tree -r HEAD \
            tests/haos_image_build \
            tests/initial_test_state \
            custom_components/ha_mcp_tools \
            homeassistant-addon-webhook-proxy \
            | sha256sum | cut -d' ' -f1 | head -c16)
          echo "cache-key=haos-image-$hash" >> "$GITHUB_OUTPUT"

      - name: Warm shared Actions cache for E2E lanes (master only)
        if: github.ref == 'refs/heads/master' && steps.e2e_cache_key.outputs.cache-key != ''
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: /tmp/haos-test-image.qcow2
          key: ${{ steps.e2e_cache_key.outputs.cache-key }}
