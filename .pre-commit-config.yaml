repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff-check
        args: [--fix]
  - repo: https://github.com/astral-sh/uv-pre-commit
    # renovate: datasource=github-releases depName=astral-sh/uv-pre-commit
    rev: 0.10.7
    hooks:
      - id: uv-lock
  - repo: local
    hooks:
      - id: mypy
        name: mypy type check
        entry: bash -c "uv run mypy src/ homeassistant-addon/ scripts/; e1=$?; uv run mypy homeassistant-addon-webhook-proxy/start.py; e2=$?; exit $((e1 | e2))"
        language: system
        pass_filenames: false
        files: ^(src/|homeassistant-addon/|homeassistant-addon-webhook-proxy/|scripts/|pyproject\.toml)
      - id: unit-tests
        name: unit tests
        entry: uv run pytest tests/src/unit/ tests/addon/test_addon_startup.py -n auto -m "not slow" --tb=short -q
        language: system
        pass_filenames: false
        files: ^(src/|homeassistant-addon/|homeassistant-addon-webhook-proxy/|scripts/|tests/|pyproject\.toml)
