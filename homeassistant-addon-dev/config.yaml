      ha_config_set_label: true
      ha_config_remove_label: true
      ha_config_get_category: true
      ha_config_set_category: true
      ha_config_remove_category: true
    scripts:
      enabled: true
      ha_config_get_script: true
      ha_config_set_script: true
      ha_config_remove_script: true
    search_discovery:
      enabled: true
      ha_search_entities: true
      ha_get_overview: true
      ha_get_state: true
      ha_get_states: true
      ha_deep_search: true
    service_device_control:
      enabled: true
      ha_call_service: true
      ha_bulk_control: true
      ha_get_operation_status: true
      ha_list_services: true
    system:
      enabled: true
      ha_restart: true
      ha_reload_core: true
      ha_check_config: true
      ha_config_set_yaml: true
      ha_get_updates: true
      ha_get_system_health: true
      ha_backup_create: true
      ha_backup_restore: true
    todo_lists:
      enabled: true
      ha_get_todo: true
      ha_add_todo_item: true
      ha_update_todo_item: true
      ha_remove_todo_item: true
    utilities:
      enabled: true
      ha_eval_template: true
      ha_report_issue: true
      ha_install_mcp_tools: true
    zones:
