name: "Home Assistant MCP Server (Dev)"
description: "Development channel - AI assistant integration via MCP (unstable)"
version: "7.13.0.dev2005"
slug: "ha_mcp_dev"
url: "https://github.com/homeassistant-ai/ha-mcp"
stage: experimental
arch:
  - aarch64
  - amd64
init: false
startup: application
boot: manual
ingress: true
ingress_port: 9583
ingress_stream: true
hassio_api: true
# `manager` (not `default`) is required so the Supervisor token grants access
# to /addons/<slug>/logs and /<service>/logs (system service logs). Verified
# via live test — `default` returns 403 for both. See #1116.
hassio_role: manager
homeassistant_api: true
host_network: true
image: "ghcr.io/homeassistant-ai/ha-mcp-addon-dev-{arch}"
options:
  backup_hint: "normal"
  enable_tool_search: false
  enable_tool_security_policies: false
  read_only_mode: false
  # Master beta gate — also dev-only (stable's schema does not declare
  # this key; the stable web UI master remains the gate there). Default
  # ON in dev so the master is pre-unlocked; the user only has to
  # opt into individual sub-tools below to activate them.
  enable_beta_features: true
  # Beta sub-flags default OFF — each one is a separate opt-in that
  # writes to the user's HA system, and shipping them on by default
  # would risk damage on a fresh install. The master above being on
  # just means "you can enable these from here," not "they are on."
  enable_yaml_config_editing: false
  # Per-key sub-gates of enable_yaml_config_editing — independently allow
  # the automation / script / scene keys inside packages/*.yaml. Default
  # OFF (opt-in per key); only meaningful when the parent
  # enable_yaml_config_editing is on.
  enable_yaml_packages_automation: false
  enable_yaml_packages_script: false
  enable_yaml_packages_scene: false
  # Two-step confirm flow for ha_config_set_yaml (#1720). Default ON — the
  # first edit call returns a diff preview + confirm token and writes
  # nothing; the edit lands only when repeated with that token. Sub-toggle
  # of enable_yaml_config_editing; turn off only to save a round-trip.
  enable_yaml_edit_confirm: true
  enable_filesystem_tools: false
  enable_dashboard_screenshot: false
  enable_code_mode: false
  enable_lite_docstrings: false
  enable_mandatory_bps: true
  enable_strict_mandatory_bps: true
  enable_auto_backup: true
  auto_backup_throttle_minutes: 0
  auto_backup_retain_per_entity: 100
  # Off by default (#1861) — an agent deleting a full HA snapshot is
  # categorically riskier than the lightweight edits-scope auto-backups
  # above (a snapshot may be the last recovery point after the agent
  # itself broke something). A human opts in here, not the agent.
  enable_snapshot_delete: false
  snapshot_delete_min_age_days: 7
  tool_search_max_results: 5
  disabled_tools: ""
  pinned_tools: ""
  verify_ssl: true
schema:
  backup_hint: list(strong|normal|weak|auto)
  secret_path: str?
  enable_tool_search: bool?
  enable_tool_security_policies: bool?
  read_only_mode: bool?
  enable_beta_features: bool?
  enable_yaml_config_editing: bool?
  enable_yaml_packages_automation: bool?
  enable_yaml_packages_script: bool?
  enable_yaml_packages_scene: bool?
  enable_yaml_edit_confirm: bool?
  enable_code_mode: bool?
  enable_lite_docstrings: bool?
  enable_mandatory_bps: bool?
  enable_strict_mandatory_bps: bool?
  enable_filesystem_tools: bool?
  enable_dashboard_screenshot: bool?
  enable_auto_backup: bool?
  auto_backup_throttle_minutes: int(0,1440)?
  auto_backup_retain_per_entity: int(1,10000)?
  enable_snapshot_delete: bool?
  snapshot_delete_min_age_days: int(0,365)?
  tool_search_max_results: int(2,10)?
  disabled_tools: str?
  pinned_tools: str?
  verify_ssl: bool?
ports:
  9583/tcp: 9583
