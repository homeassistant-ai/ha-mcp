name: "Home Assistant MCP Server (Dev)"
description: "Development channel - AI assistant integration via MCP (unstable)"
version: "dev"
slug: "ha_mcp_dev"
url: "https://github.com/homeassistant-ai/ha-mcp"
stage: experimental
arch:
  - aarch64 # 64-bit ARM (Raspberry Pi 4+, modern ARM devices)
  - amd64 # 64-bit x86 (most PCs and servers)
  # Note: 32-bit platforms (armhf, armv7, i386) not supported
  # uv base image only provides amd64 and arm64 builds
init: false
startup: application
boot: manual
# Enable access to Supervisor API for auto-discovery
hassio_api: true
hassio_role: default
# Enable access to Home Assistant API
homeassistant_api: true
# Enable host network mode for local network access
host_network: true
# Use pre-built Docker images
image: "ghcr.io/homeassistant-ai/ha-mcp-addon-dev-{arch}"
# Options for user configuration
options:
  backup_hint: "normal"
  enable_skills: true
  enable_skills_as_tools: false
  enable_tool_search: false
  enable_yaml_config_editing: false
  tool_search_max_results: 5
  enabled_tools:
    addons:
      enabled: true
      ha_get_addon: true
      ha_call_addon_api: true
    areas_floors:
      enabled: true
      ha_config_list_areas: true
      ha_config_list_floors: true
      ha_config_set_area: true
      ha_config_set_floor: true
      ha_config_remove_area: true
      ha_config_remove_floor: true
    automations:
      enabled: true
      ha_config_get_automation: true
      ha_config_set_automation: true
      ha_config_remove_automation: true
    blueprints:
      enabled: true
      ha_get_blueprint: true
      ha_import_blueprint: true
    calendar:
      enabled: true
      ha_config_get_calendar_events: true
      ha_config_set_calendar_event: true
      ha_config_remove_calendar_event: true
    camera:
      enabled: true
      ha_get_camera_image: true
    dashboards:
      enabled: true
      ha_config_get_dashboard: true
      ha_config_set_dashboard: true
      ha_config_delete_dashboard: true
      ha_dashboard_find_card: true
      ha_config_list_dashboard_resources: true
      ha_config_set_dashboard_resource: true
      ha_config_delete_dashboard_resource: true
    device_registry:
      enabled: true
      ha_get_device: true
      ha_update_device: true
      ha_remove_device: true
      ha_rename_entity: true
    entity_registry:
      enabled: true
      ha_get_entity: true
      ha_set_entity: true
      ha_get_entity_exposure: true
    files:
      enabled: true
      ha_list_files: true
      ha_read_file: true
      ha_write_file: true
      ha_delete_file: true
    groups:
      enabled: true
      ha_config_list_groups: true
      ha_config_set_group: true
      ha_config_remove_group: true
    hacs:
      enabled: true
      ha_hacs_info: true
      ha_hacs_search: true
      ha_hacs_list_installed: true
      ha_hacs_repository_info: true
      ha_hacs_download: true
      ha_hacs_add_repository: true
    helper_entities:
      enabled: true
      ha_config_list_helpers: true
      ha_config_set_helper: true
      ha_config_remove_helper: true
      ha_get_helper_schema: true
      ha_set_config_entry_helper: true
    history_statistics:
