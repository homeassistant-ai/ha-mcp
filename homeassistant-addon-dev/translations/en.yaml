---
configuration:
  backup_hint:
    name: Backup hint
    description: Controls when backup reminders are shown before risky operations.
  secret_path:
    name: Secret path override
    description: |
      Optional custom HTTP path for the MCP server. Leave empty to use the auto-generated secure path.
  enable_skills:
    name: Enable skills
    description: >-
      Serve bundled Home Assistant best-practice skills as MCP resources.
      Skills provide automation patterns, helper selection guides, and device
      control best practices. Clients must explicitly request them.
  enable_skills_as_tools:
    name: Enable skills as tools
    description: >-
      Expose skills via list_resources/read_resource tools for MCP clients
      that don't support resources natively. Adds 3 extra tools.
  enable_tool_search:
    name: Enable tool search
    description: >-
      Replace the full tool catalog with search-based discovery. Reduces
      idle context from ~46K to ~5K tokens. Use this if using an LLM without
      deferred tools or with smaller context windows. Tools are found via
      ha_search_tools and executed via categorized proxies (read/write/delete).
      Requires restart to take effect.
  enable_yaml_config_editing:
    name: Enable YAML config editing
    description: >-
      Allow AI assistants to add, replace, or remove top-level keys in
      configuration.yaml and packages/*.yaml. Only whitelisted keys are
      allowed (e.g., template, sensor, command_line, mqtt). Core keys
      like homeassistant, http, and recorder are blocked. A backup is
      created before every edit. Use for YAML-only features that have no
      UI or API alternative. Requires restart to take effect.
  tool_search_max_results:
    name: Tool search max results
    description: >-
      Maximum number of tools returned by ha_search_tools when tool
      search is enabled. Lower values (2-3) save context tokens but
      may miss relevant tools. Range: 2-10. Requires restart.
  enabled_tools:
    name: Enabled tools
    description: >-
      Control which tools are available to AI assistants. Toggle groups
      on/off to enable or disable all tools in a category, or toggle
      individual tools. Mandatory tools (Search Entities, Get Overview,
      Get State, Report Issue) cannot be disabled. Requires restart.
    addons:
      name: Add-ons
      description: Manage Home Assistant add-ons.
      enabled:
        name: Enable all Add-ons tools
        description: Master toggle for the Add-ons group.
      ha_get_addon:
        name: Get Add-ons
        description: >-
          List installed or available add-ons, or get details for a specific one. (read-only)
      ha_call_addon_api:
        name: Call Add-on API
        description: >-
          Call an add-on's HTTP or WebSocket API. (destructive)
    areas_floors:
      name: Areas & Floors
      description: Manage areas (rooms) and floors.
      enabled:
        name: Enable all Areas & Floors tools
        description: Master toggle for the Areas & Floors group.
      ha_config_list_areas:
        name: List Areas
        description: >-
          List all Home Assistant areas (rooms). (read-only)
      ha_config_list_floors:
        name: List Floors
        description: >-
          List all Home Assistant floors. (read-only)
      ha_config_set_area:
        name: Create or Update Area
        description: >-
          Create or update a Home Assistant area (room). (destructive)
      ha_config_set_floor:
        name: Create or Update Floor
        description: >-
          Create or update a Home Assistant floor. (destructive)
      ha_config_remove_area:
        name: Remove Area
        description: >-
          Delete a Home Assistant area. (destructive)
      ha_config_remove_floor:
        name: Remove Floor
        description: >-
          Delete a Home Assistant floor. (destructive)
    automations:
      name: Automations
      description: Create, read, and manage automations.
      enabled:
        name: Enable all Automations tools
        description: Master toggle for the Automations group.
      ha_config_get_automation:
        name: Get Automation Config
        description: >-
          Retrieve Home Assistant automation configuration. (read-only)
      ha_config_set_automation:
        name: Create or Update Automation
        description: >-
          Create or update a Home Assistant automation. (destructive)
      ha_config_remove_automation:
        name: Remove Automation
        description: >-
          Delete a Home Assistant automation. (destructive)
    blueprints:
      name: Blueprints
      description: Manage automation and script blueprints.
      enabled:
        name: Enable all Blueprints tools
        description: Master toggle for the Blueprints group.
      ha_get_blueprint:
        name: Get Blueprint
        description: >-
          List all blueprints or get details for a specific one. (read-only)
      ha_import_blueprint:
        name: Import Blueprint
        description: >-
          Import a blueprint from a URL. (destructive)
    calendar:
      name: Calendar
      description: Manage calendar events.
      enabled:
        name: Enable all Calendar tools
        description: Master toggle for the Calendar group.
      ha_config_get_calendar_events:
        name: Get Calendar Events
        description: >-
          Retrieve calendar events from a calendar entity. (read-only)
      ha_config_set_calendar_event:
        name: Create or Update Calendar Event
        description: >-
          Create a new event in a calendar. (destructive)
      ha_config_remove_calendar_event:
        name: Remove Calendar Event
        description: >-
          Delete an event from a calendar. (destructive)
    camera:
      name: Camera
      description: Access camera snapshots.
      enabled:
        name: Enable all Camera tools
        description: Master toggle for the Camera group.
      ha_get_camera_image:
        name: Get Camera Image
        description: >-
          Retrieve a snapshot image from a camera entity. (read-only)
    dashboards:
      name: Dashboards
      description: Manage Lovelace dashboards, cards, and resources.
      enabled:
        name: Enable all Dashboards tools
        description: Master toggle for the Dashboards group.
      ha_config_get_dashboard:
        name: Get Dashboard
        description: >-
          List all dashboards or get config for a specific one. (read-only)
      ha_config_set_dashboard:
        name: Create or Update Dashboard
        description: >-
          Create or update a Home Assistant dashboard. (destructive)
      ha_config_delete_dashboard:
        name: Delete Dashboard
        description: >-
          Delete a storage-mode dashboard completely. (destructive)
      ha_dashboard_find_card:
        name: Find Dashboard Card
        description: >-
          Find cards in a dashboard by entity_id, type, or heading text. (read-only)
      ha_config_list_dashboard_resources:
        name: List Dashboard Resources
        description: >-
          List all Lovelace dashboard resources (custom cards, themes). (read-only)
      ha_config_set_dashboard_resource:
        name: Set Dashboard Resource
        description: >-
          Create or update a dashboard resource. (destructive)
      ha_config_delete_dashboard_resource:
        name: Delete Dashboard Resource
        description: >-
          Delete a dashboard resource. (destructive)
    device_registry:
      name: Device Registry
      description: Manage devices and entity renaming.
      enabled:
        name: Enable all Device Registry tools
        description: Master toggle for the Device Registry group.
      ha_get_device:
        name: Get Device
        description: >-
          Get device information including Zigbee and Z-Wave details. (read-only)
      ha_update_device:
        name: Update Device
        description: >-
          Update device properties such as name, area, or labels. (destructive)
      ha_remove_device:
        name: Remove Device
        description: >-
          Remove an orphaned device from the registry. (destructive)
      ha_rename_entity:
        name: Rename Entity
        description: >-
          Rename an entity by changing its entity_id. (destructive)
    entity_registry:
      name: Entity Registry
      description: Manage entity properties and exposure settings.
      enabled:
        name: Enable all Entity Registry tools
        description: Master toggle for the Entity Registry group.
      ha_get_entity:
        name: Get Entity
        description: >-
          Get entity registry information for one or more entities. (read-only)
      ha_set_entity:
        name: Set Entity
        description: >-
          Update entity properties in the entity registry. (destructive)
      ha_get_entity_exposure:
        name: Get Entity Exposure
        description: >-
          Get entity exposure settings for voice assistants. (read-only)
    files:
      name: Files
      description: Read, write, and manage files in the config directory.
      enabled:
        name: Enable all Files tools
        description: Master toggle for the Files group.
      ha_list_files:
        name: List Files
        description: >-
          List files in a directory within the config directory. (read-only)
      ha_read_file:
        name: Read File
        description: >-
          Read a file from the config directory. (read-only)
      ha_write_file:
