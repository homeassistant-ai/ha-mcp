    search_discovery:
      name: Search & Discovery
      description: >-
        Find entities and get system state. Core tools in this group
        (Search Entities, Get Overview, Get State, Report Issue)
        are mandatory and cannot be disabled.
      enabled:
        name: Enable all Search & Discovery tools
        description: >-
          Master toggle for the Search & Discovery group. Note:
          ha_search_entities, ha_get_overview, ha_get_state, and
          ha_report_issue are mandatory and will remain enabled.
      ha_search_entities:
        name: Search Entities (mandatory)
        description: >-
          Find entities by name, area, or domain. This is a mandatory
          tool and cannot be disabled. (read-only)
      ha_get_overview:
        name: Get System Overview (mandatory)
        description: >-
          Get AI-friendly system overview with categorization. This is a
          mandatory tool and cannot be disabled. (read-only)
      ha_get_state:
        name: Get Entity State (mandatory)
        description: >-
          Get current state and attributes of any entity. This is a
          mandatory tool and cannot be disabled. (read-only)
      ha_get_states:
        name: Get Multiple Entity States
        description: >-
          Get state for multiple entities in a single call. (read-only)
      ha_deep_search:
        name: Deep Search
        description: >-
          Search inside automation, script, and helper configurations. (read-only)
    service_device_control:
      name: Service & Device Control
      description: Control devices and call services.
      enabled:
        name: Enable all Service & Device Control tools
        description: Master toggle for the Service & Device Control group.
      ha_call_service:
        name: Call Service
        description: >-
          Execute HA services to control entities and trigger automations. (destructive)
      ha_bulk_control:
        name: Bulk Control
        description: >-
