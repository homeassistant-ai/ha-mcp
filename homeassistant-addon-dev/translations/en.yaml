      ha_get_operation_status:
        name: Get Operation Status
        description: >-
          Check status of device operations with WebSocket verification. (read-only)
      ha_list_services:
        name: List Available Services
        description: >-
          List available services with their parameters. (read-only)
    system:
      name: System
      description: System management, backups, and YAML config editing.
      enabled:
        name: Enable all System tools
        description: Master toggle for the System group.
      ha_restart:
        name: Restart Home Assistant
        description: >-
          Restart Home Assistant. (destructive)
      ha_reload_core:
        name: Reload Core Components
        description: >-
          Reload configuration without full restart. (destructive)
      ha_check_config:
        name: Check Configuration
        description: >-
          Check Home Assistant configuration for errors. (read-only)
      ha_config_set_yaml:
        name: Set YAML Config
        description: >-
          Add, replace, or remove top-level keys in configuration.yaml.
          Also gated by the "Enable YAML config editing" toggle. (destructive)
      ha_get_updates:
        name: Get Updates
        description: >-
          List available updates or get details for a specific one. (read-only)
      ha_get_system_health:
        name: Get System Health
        description: >-
          Get system health including Zigbee and Z-Wave diagnostics. (read-only)
      ha_backup_create:
        name: Create Backup
        description: >-
          Create a fast Home Assistant backup. (destructive)
      ha_backup_restore:
        name: Restore Backup
        description: >-
          Restore from a backup. Use with extreme caution. (destructive)
    todo_lists:
