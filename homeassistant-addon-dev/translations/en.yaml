        description: Master toggle for the Utilities group.
      ha_eval_template:
        name: Evaluate Template
        description: >-
          Evaluate Jinja2 templates using HA's template engine. (read-only)
      ha_report_issue:
        name: Report Issue (mandatory)
        description: >-
          Collect diagnostic information for issue reports. This is a
