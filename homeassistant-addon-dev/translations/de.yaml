---
configuration:
  backup_hint:
    name: Full-HA Snapshot-Vorschlagsebene (LLM-seitig)
    description: |-
      Passt die Formulierung des Hinweises an, den das LLM in der
      `ha_manage_backup(scope='snapshot')`-Tool-Beschreibung sieht, wann es ein
      vollständiges Home Assistant Tarball-Backup vor riskanten Operationen
      vorschlagen soll (z.B. Massen-Gerätelöschungen). Betrifft NUR diesen einen
      LLM-seitigen Prompt-Satz.

      Für automatische Snapshots pro Bearbeitung von Automatisierungen / Skripten /
      Helfern / etc. nutze den separaten **Enable auto-backup of edits**-Schalter
      unten.
  secret_path:
    name: Secret-Pfad Override
    description: |
      Optionaler benutzerdefinierter HTTP-Pfad für den MCP-Server. Leer lassen, um den automatisch generierten sicheren Pfad zu verwenden.
  enable_tool_search:
    name: Tool Search aktivieren
    description: >-
      Ersetzt den vollständigen Tool-Katalog durch suchbasierte Entdeckung. Reduziert
      den Idle-Kontext von ~46K auf ~5K Tokens. ⚠️ Aktiviere dies NICHT, wenn du
      Claude in Sonnet- oder Opus-Modi nutzt – diese Modelle haben eigenen
      eingebauten Tool Search / Deferred Tools, der mit unserem kollidiert. Um
      ha-mcps Tool Search mit Claude zu nutzen, deaktiviere zuerst Claudes
      eingebauten Tool Search; ansonsten lass dies aus. Nutze dies nur mit LLMs,
      die native Deferred Tools fehlen (z.B. Claude Haiku, lokale
      OpenAI-kompatible Modelle) oder mit kleineren Kontextfenstern. Tools werden
      via ha_search_tools gefunden und über kategorisierte Proxies ausgeführt
      (read/write/delete). Erfordert Neustart, um wirksam zu werden.
  enable_tool_security_policies:
    name: Tool Security Policies aktivieren (erweitert)
    description: >-
      Schützt hochriskante Tool-Aufrufe (Lock/Alarm-Steuerung,
      Automatisierungs-Schreibvorgänge, etc.) hinter Benutzer-Genehmigung. Wenn
      ein geschütztes Tool aufgerufen wird, teilt der Agent dem Benutzer mit, den
      Tool Security Policies-Tab im Web UI zu öffnen und Approve zu klicken,
      bevor der Aufruf fortfährt. Pro-Tool-Regeln mit optionalen
      Argument-Bedingungen werden im Tool Security Policies-Tab konfiguriert.
      Standardmäßig aus. Erfordert Neustart, um wirksam zu werden.
  read_only_mode:
    name: Read-Only-Modus
    description: >-
      Schaltet alle Schreib-Tools aus und entfernt die Fähigkeit für Tools,
      Schreib- oder destruktive Aufrufe zu machen. Gemischte Read/Write-Tools
      (Backups, Add-ons, Energiepräferenzen, Voice Pipelines und Code-Modus wenn
      aktiviert) bleiben verfügbar mit blockierten Schreiboperationen. Gleicher
      Schalter wie im Web UI Tools-Tab. Standardmäßig aus. Erfordert Neustart, um
      wirksam zu werden.
  enable_beta_features:
    name: Beta-Features aktivieren (Master)
    description: >-
      ⚠ GEFAHR – diese Tools können deine Home Assistant Installation PERMANENT
      BESCHÄDIGEN. Sie schreiben in deine YAML-Config, dein Dateisystem,
      installieren Custom Components, führen beliebigen sandboxed Python aus und
      bearbeiten Tool-Docstrings, die die AI sieht. Es gibt keine Garantie und
      keine Support-Garantie – du aktivierst sie auf DEIN EIGENES RISIKO.
      Erstelle ein Home Assistant Backup, bevor du dies einschaltest, und
      aktiviere es nie in Produktion ohne eines. Master Gate für die 5
      experimentellen Sub-Flags unten; Sub-Flags werden zur Laufzeit ignoriert,
      während dieser Master aus ist, auch wenn explizit auf true gesetzt. Der
      gleiche Schalter ist auch im Web-Settings-UI unter "Beta features
      (dangerous)" verfügbar – beide Oberflächen spiegeln sich beim Neustart
      wider.
  enable_yaml_config_editing:
    name: YAML-Config-Bearbeitung aktivieren (Beta)
    description: >-
      Beta-Feature. Erlaubt AI-Assistenten, Top-Level-Keys in configuration.yaml
      und packages/*.yaml hinzuzufügen, zu ersetzen oder zu entfernen. Nur
      whitelistete Keys sind erlaubt (z.B. template, sensor, command_line, mqtt,
      knx); Core-Keys wie homeassistant, http und recorder sind blockiert. Jede
      Bearbeitung validiert YAML-Syntax, führt einen Config-Check durch und
      erstellt ein automatisches Backup. Änderungen an den meisten Keys erfordern
      einen vollständigen HA-Neustart, um wirksam zu werden. Siehe docs/beta.md
      für bekannte Einschränkungen. Dedizierte Tools (Automatisierungen, Skripte,
      Szenen, Helfer, Template-Sensoren) sollten bevorzugt werden, wenn
      verfügbar. ERFORDERT, dass der Master "Enable beta features"-Schalter oben
      (und im Web UI) an ist – ansonsten wird dieses Sub-Flag zur Laufzeit
      ignoriert, unabhängig von seinem Wert hier.
  enable_yaml_edit_confirm:
    name: Bestätigung für YAML-Bearbeitungen erfordern (Diff-Vorschau)
    description: >-
      Sub-Toggle der YAML-Config-Bearbeitung, standardmäßig AN (empfohlen). Der
      erste ha_config_set_yaml-Aufruf gibt einen Unified Diff zurück, der genau
      zeigt, was sich auf der Disk ändern würde, plus einen Confirm-Token, und
      schreibt nichts; die Bearbeitung landet nur, wenn der Aufruf mit diesem
      Token wiederholt wird. Existiert, damit unbeabsichtigte Änderungen außerhalb
      der angeforderten Bearbeitung abgefangen werden, bevor sie die Disk
      erreichen (Issue #1720). Nur ausschalten, um einen Round-Trip pro
      Bearbeitung zu sparen.
  enable_yaml_packages_automation:
    name: automation in packages/*.yaml erlauben
    description: >-
      Sub-Toggle der YAML-Config-Bearbeitung. Wenn an, akzeptiert
      ha_config_set_yaml yaml_path='automation' innerhalb packages/*.yaml. Wenn
      aus, wird der Aufruf sowohl client-seitig als auch server-seitig abgelehnt.
      Das Storage-Mode-Tool (ha_config_set_automation) ist nicht betroffen.
      Standard AUS; wirkt nur, wenn "Enable YAML config editing" oben ebenfalls
      an ist.
  enable_yaml_packages_script:
    name: script in packages/*.yaml erlauben
    description: >-
      Sub-Toggle der YAML-Config-Bearbeitung. Wenn an, akzeptiert
      ha_config_set_yaml yaml_path='script' innerhalb packages/*.yaml. Wenn aus,
      wird der Aufruf sowohl client-seitig als auch server-seitig abgelehnt. Das
      Storage-Mode-Tool (ha_config_set_script) ist nicht betroffen. Standard AUS;
      wirkt nur, wenn "Enable YAML config editing" oben ebenfalls an ist.
  enable_yaml_packages_scene:
    name: scene in packages/*.yaml erlauben
    description: >-
      Sub-Toggle der YAML-Config-Bearbeitung. Wenn an, akzeptiert
      ha_config_set_yaml yaml_path='scene' innerhalb packages/*.yaml. Wenn aus,
      wird der Aufruf sowohl client-seitig als auch server-seitig abgelehnt. Das
      Storage-Mode-Tool (ha_config_set_scene) ist nicht betroffen. Standard AUS;
      wirkt nur, wenn "Enable YAML config editing" oben ebenfalls an ist.
  enable_code_mode:
    name: Custom Tool Sandbox aktivieren (Beta)
    description: >-
      Beta-Feature. Aktiviert das ha_manage_custom_tool-Tool, das
      AI-Assistenten erlaubt, Custom Python-Code in einer sicheren Sandbox zu
      erstellen, auszuführen, zu speichern und zu löschen, wenn kein
      eingebautes Tool die Anfrage bearbeiten kann. Code läuft in einem
      isolierten Interpreter ohne Dateisystem- oder beliebigen Netzwerkzugriff.
      Sandbox-Code kann die HA REST API (api_get/api_post) treffen,
      WebSocket-Befehle senden (ws_send), existierende MCP-Tools aufrufen
      (call_tool) oder ein gespeichertes Tool entfernen (delete_saved_tool).
      Gespeicherte Tools persistieren standardmäßig in /data/saved_tools.json,
      sodass sie Add-on-Neustarts überleben und für jeden Client sichtbar sind,
      der sich verbinden kann. Siehe docs/beta.md für bekannte Einschränkungen.
      Erfordert Neustart, um wirksam zu werden. ERFORDERT, dass der Master
      "Enable beta features"-Schalter oben (und im Web UI) an ist – ansonsten
      wird dieses Sub-Flag zur Laufzeit ignoriert, unabhängig von seinem Wert
      hier.
  enable_auto_backup:
    name: Auto-Backup von Bearbeitungen aktivieren
    description: >-
      Erfasst einen Pro-Entität-Snapshot vor jedem umschlossenen
      Schreib/destruktiven MCP-Tool-Aufruf (Automatisierung, Skript, Szene,
      Helfer, Dashboard, Label, Kategorie, Gruppe, Zone, Bereich, Kalender, Todo,
      Entität, Integration und verwandte Remove/Delete-Tools). Snapshots werden
      als YAML-Dateien unter /data/ha_mcp_backups/ gespeichert (Override via
      HAMCP_BACKUP_DIR) und über den Backups-Tab im Web-Settings-UI oder via
      ha_manage_backup(scope='edits', ...) aufgelistet, wiederhergestellt oder
      gelöscht. Best-Effort – Fehler loggen ein WARNING, blockieren aber nie den
      zugrunde liegenden Schreibvorgang. Standardmäßig an; abhaken, um
      auszusteigen. Erfordert Neustart, um wirksam zu werden.
  auto_backup_throttle_minutes:
    name: Auto-Backup-Drosselung (Minuten)
    description: >-
      Pro-Entität-Drosselungsfenster. 0 (Standard) erfasst einen Snapshot bei
      jedem umschlossenen Schreibvorgang. N>0 erfasst höchstens einen Snapshot pro
      N Minuten pro Entität. Bereich 0–1440.
  auto_backup_retain_per_entity:
    name: Auto-Backup-Aufbewahrung (pro Entität)
    description: >-
      Maximale Anzahl von Snapshots, die pro Entität behalten werden. Ältere
      Snapshots jenseits dieser Grenze werden bei jeder erfolgreichen Erfassung
      ausgetauscht. Standard 100, Bereich 1–10000.
  enable_snapshot_delete:
    name: Snapshot-Löschung erlauben
    description: >-
      Lässt ha_manage_backup vollständige HA-Snapshot-Tarballs löschen
      (scope='snapshot', action='delete'). Standardmäßig aus – ein Snapshot
      könnte der letzte Wiederherstellungspunkt nach einer fehlerhaften Änderung
      sein, also muss ein Mensch hier opt-in. Auch wenn an, bleiben geplante
      Backups, der neueste verbleibende Snapshot und alles jünger als der
      Alters-Floor unten geschützt.
  snapshot_delete_min_age_days:
    name: Mindestalter für Snapshot-Löschung (Tage)
    description: >-
      Ein Snapshot muss mindestens so alt sein, bevor er gelöscht werden kann.
      Bereich 0–365; 0 deaktiviert den Floor (die Neuester-Snapshot- und
      Geplante-Backup-Schutzmaßnahmen gelten weiterhin). Standard 7.
  enable_lite_docstrings:
    name: Lite Tool Docstrings aktivieren (Beta)
    description: >-
      Beta-Feature. Ersetzt die Docstrings bei einer Handvoll schwerer
      ha-mcp-Tools (Automatisierungen, Skripte, Szenen, Helfer, Dashboards,
      ha_call_service, ha_config_set_yaml) durch kürzere Varianten, die Schema-
      und Beispiel-Details an das ha_get_skill_guide-Tool (oder seine
      skill://-Ressource) delegieren. WARNUNG: Dies reduziert die Idle
      Token-Nutzung, kann aber die LLM-Performance verschlechtern – die
      getrimmten Beschreibungen verlassen sich darauf, dass das LLM tatsächlich
      das Skill-Tool aufruft oder die Skill-Ressource für Details liest, was
      nicht garantiert ist (einige Modelle überspringen den Extra-Tool-Aufruf und
      enden mit weniger Anleitung als zuvor). Am besten gepaart mit einem Client,
      der MCP-Ressourcen unterstützt, oder mit enable_tool_search. Erfordert
      Neustart, um wirksam zu werden. ERFORDERT, dass der Master "Enable beta
      features"-Schalter oben (und im Web UI) an ist – ansonsten wird dieses
      Sub-Flag zur Laufzeit ignoriert, unabhängig von seinem Wert hier.
  enable_mandatory_bps:
    name: Best-Practice-Skills bei Schreibvorgängen anhängen
    description: >-
      Hauptschalter für die Schreib-Tool Skill Content Delivery Feature (Issue
      #1182). Wenn aktiviert (Standard), hängen die sechs Config-Schreib-Tools
      (Automatisierungen, Skripte, Szenen, Helfer, Dashboards, Raw YAML) die
      kanonischen Home Assistant Best-Practice-Referenzdateien unter
      `skill_content` bei jedem erfolgreichen Schreibvorgang an, plus
      Auto-Embedding aller Referenzsektionen, die von Best-Practice-Warnungen
      zitiert werden. Jedes Tool stellt auch einen `MandatoryBPS`-Parameter pro
      Aufruf bereit, den der Agent bei Folgeaufrufen auf false setzen kann, sobald
      er den Inhalt hat. Wenn dieser Hauptschalter aus ist, geht KEIN
      skill_content raus, unabhängig vom Pro-Aufruf-Parameter oder BP-Warnungen.
      Empfohlen AN als erste Wahl; deaktiviere nur bei Modellen mit sehr kleinen
      Kontextfenstern. Dies auszuschalten kann die Schreibgenauigkeit
      verschlechtern. Erfordert Neustart, um wirksam zu werden.
  enable_strict_mandatory_bps:
    name: Strikter Best-Practices-Modus
    description: >-
      Strikter Modus: verhindert, dass der Client das Tool nutzt, bis er
      nachweisen kann, dass er die Best Practices gelesen hat. Während an, sind
      die sechs Best-Practice-Schreib-Tools (Automatisierungen, Skripte, Szenen,
      Helfer, Dashboards, Raw YAML) blockiert und geben einen Fehler zurück, der
      den Client anweist, die Best-Practices-Skill via ha_get_skill_guide zu
      lesen und den dort erhaltenen Acknowledgment Key zurückzugeben. Während an,
      ist das ha_get_skill_guide-Tool gesperrt aktiviert – es ist der einzige
      Publisher des Acknowledgment Keys. Kind der "Attach best-practice skills on
      writes"-Option oben und inert, während dieses Parent aus ist. Erfordert
      Neustart, um wirksam zu werden.
  enable_filesystem_tools:
    name: Dateisystem-Tools aktivieren (Beta)
    description: >-
      Setzt HAMCP_ENABLE_FILESYSTEM_TOOLS=true. Aktiviert direkten
      Lese-/Schreibzugriff auf dein Home Assistant Dateisystem. WARNUNG: Dies
      gibt dem MCP-Server sensiblen direkten Dateizugriff auf dein System.
      Aktiviere nur, wenn du dem AI-Assistenten mit Dateioperationen vertraust.
      Erfordert Neustart, um wirksam zu werden. ERFORDERT, dass der Master
      "Enable beta features"-Schalter oben (und im Web UI) an ist – ansonsten
      wird dieses Sub-Flag zur Laufzeit ignoriert, unabhängig von seinem Wert
      hier.
  enable_dashboard_screenshot:
    name: Dashboard-Screenshot-Modus aktivieren (Beta)
    description: >-
      Beta-Feature – standardmäßig deaktiviert. Fügt das
      ha_get_dashboard_screenshot-Tool hinzu plus include_screenshot /
      return_screenshot-Optionen auf den Dashboard-Get/Set-Tools, sodass
      AI-Assistenten ein oder mehrere responsive Lovelace-Bilder inspizieren
      können (z.B. um ein gerade erstelltes Dashboard zu verifizieren).
      Unterstützt stabile benannte Views, Mobile/Tablet/Desktop-Batches und
      PNG/JPEG/WebP/BMP-Ausgabe. Das Rendering läuft in einer separaten,
      opt-in-Engine – balloobs "Puppet" Add-on (headless Chromium) –, das du
      einmal installierst (füge balloobs Add-on-Repository hinzu, dann
      installiere "Puppet") und gibst ihm einen Long-Lived Access Token; bei
      Docker/Container-Deployments läuft diese Engine als Sidecar und du setzt
      HAMCP_DASHBOARD_SCREENSHOT_ENGINE_URL. Nichts Schweres wird installiert,
      außer du aktivierst sowohl dies als auch installierst die Engine. Erfordert
      Neustart, um wirksam zu werden. ERFORDERT, dass der Master "Enable beta
      features"-Schalter oben (und im Web UI) an ist – ansonsten wird dieses
      Sub-Flag zur Laufzeit ignoriert, unabhängig von seinem Wert hier.
  tool_search_max_results:
    name: Tool Search Max-Ergebnisse
    description: >-
      Maximale Anzahl von Tools, die von ha_search_tools zurückgegeben werden,
      wenn Tool Search aktiviert ist. Niedrigere Werte (2-3) sparen
      Kontext-Tokens, könnten aber relevante Tools verpassen. Bereich: 2-10.
      Erfordert Neustart.
  disabled_tools:
    name: Deaktivierte Tools (kommagetrennt)
    description: >-
      Hier aufgelistete Tools sind zwangsweise aus und im Web-Settings-UI
      (Tools-Tab) gesperrt – sie können dort nicht wieder aktiviert werden, ohne
      diese Option zuerst zu entfernen. Ein kleiner Satz obligatorischer Tools
      (ha_search, ha_get_overview, ha_get_state, ha_report_issue,
      ha_manage_backup) kann nicht deaktiviert werden und läuft weiter, auch wenn
      hier aufgelistet. ha_get_skill_guide kann nur deaktiviert werden, während
      der strikte Best-Practices-Modus (enable_strict_mandatory_bps) aus ist.
      Kommagetrennte Tool-Namen (z.B. ha_call_event,ha_eval_template).
  pinned_tools:
    name: Angeheftete Tools (kommagetrennt)
    description: >-
      Hier aufgelistete Tools sind gesperrt angeheftet – sie erscheinen oben im
      Tools-Tab und können nicht vom Web-Settings-UI entfernt werden, ohne diese
      Option zuerst zu entfernen. Nützlich in Kombination mit Tool Search.
      Kommagetrennte Tool-Namen.
  verify_ssl:
    name: TLS-Zertifikat verifizieren
    description: >-
      Verifiziert das TLS-Zertifikat des Home Assistant Servers. Das Add-on
      verbindet sich via Supervisor-Proxy, daher hat dies normalerweise keinen
      Effekt und sollte aktiviert bleiben. Deaktiviere nur, wenn du das Add-on
      umkonfiguriert hast, um mit HA über einen öffentlichen HTTPS-Hostnamen mit
      selbstsigniertem Zertifikat oder Hostname-Mismatch zu sprechen.
      Deaktivieren schwächt die Transport-Sicherheit – lass an, außer du weißt,
      dass du es brauchst. Erfordert Neustart, um wirksam zu werden.
