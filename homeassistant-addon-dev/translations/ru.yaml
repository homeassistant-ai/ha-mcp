---
configuration:
  backup_hint:
    name: Уровень рекомендации полного снимка HA (для LLM)
    description: |-
      Настраивает формулировку подсказки, которую видит LLM в описании
      инструмента `ha_manage_backup(scope='snapshot')`, о том, когда следует
      предложить создание полной резервной копии Home Assistant в виде tar-архива
      перед рискованными операциями (например, массовым удалением устройств).
      Влияет ТОЛЬКО на одно это предложение в подсказке для LLM.

      Для автоматического создания снимков перед каждым изменением автоматизаций,
      скриптов, помощников и т. д. используйте отдельный переключатель
      **Включить автоматическое резервное копирование изменений** ниже.
  secret_path:
    name: Переопределение секретного пути
    description: |
      Необязательный пользовательский HTTP-путь к MCP-серверу. Оставьте пустым, чтобы использовать автоматически созданный защищённый путь.
  enable_tool_search:
    name: Включить поиск инструментов
    description: >-
      Заменяет полный каталог инструментов поиском по запросу. Уменьшает
      неиспользуемый контекст примерно с 46 тыс. до 5 тыс. токенов. ⚠️ НЕ
      включайте этот параметр, если используете Claude в режимах Sonnet или
      Opus: у этих моделей есть собственный встроенный поиск инструментов и
      отложенные инструменты, которые конфликтуют с нашими. Чтобы использовать
      поиск инструментов ha-mcp с Claude, сначала отключите встроенный поиск
      инструментов Claude; в противном случае оставьте этот параметр выключенным.
      Используйте его только с LLM без собственных отложенных инструментов
      (например, Claude Haiku или локальными OpenAI-совместимыми моделями) либо
      с небольшими контекстными окнами. Инструменты находятся через
      ha_search_tools и выполняются через распределённые по категориям прокси
      (чтение, запись, удаление). Для применения требуется перезапуск.
  enable_tool_security_policies:
    name: Включить политики безопасности инструментов (расширенная настройка)
    description: >-
      Требует подтверждения пользователя для особо важных вызовов инструментов
      (управление замками и сигнализацией, запись автоматизаций и т. д.). Когда
      вызывается защищённый инструмент, агент предлагает пользователю открыть
      вкладку «Политики безопасности инструментов» в веб-интерфейсе и нажать
      «Одобрить», прежде чем вызов будет выполнен. Правила для отдельных
      инструментов с необязательными условиями для аргументов настраиваются на
      вкладке «Политики безопасности инструментов». По умолчанию выключено.
      Для применения требуется перезапуск.
  read_only_mode:
    name: Режим только для чтения
    description: >-
      Отключает все инструменты записи и запрещает инструментам выполнять любые
      операции записи или разрушительные действия. Смешанные инструменты чтения
      и записи (резервные копии, дополнения, параметры энергопотребления,
      голосовые конвейеры и режим кода, если он включён) остаются доступными, но
      их операции записи блокируются. Это тот же переключатель, что и на вкладке
      «Инструменты» веб-интерфейса. По умолчанию выключено. Для применения
      требуется перезапуск.
  enable_beta_features:
    name: Включить бета-функции (главный переключатель)
    description: >-
      ⚠ ОПАСНОСТЬ — эти инструменты могут НЕОБРАТИМО ПОВРЕДИТЬ вашу установку
      Home Assistant. Они изменяют конфигурацию YAML и файловую систему,
      устанавливают пользовательские компоненты, выполняют произвольный Python-код
      в песочнице и редактируют видимые ИИ строки документации инструментов.
      Никаких гарантий и обязательств поддержки нет — вы включаете их НА СВОЙ
      СТРАХ И РИСК. Перед включением создайте резервную копию Home Assistant и
      никогда не включайте их в рабочей системе без резервной копии. Это главный
      переключатель для пяти экспериментальных подпараметров ниже; пока он
      выключен, подпараметры игнорируются во время выполнения, даже если явно
      установлены в true. Тот же переключатель доступен в веб-интерфейсе настроек
      в разделе «Бета-функции (опасно)»; после перезапуска значения в обоих местах
      синхронизируются.
  enable_yaml_config_editing:
    name: Включить редактирование конфигурации YAML (бета)
    description: >-
      Бета-функция. Позволяет ИИ-помощникам добавлять, заменять и удалять ключи
      верхнего уровня в configuration.yaml и packages/*.yaml. Разрешены только
      ключи из белого списка (например, template, sensor, command_line, mqtt,
      knx); основные ключи, такие как homeassistant, http и recorder,
      заблокированы. Каждое изменение проходит проверку синтаксиса YAML и
      конфигурации, а также создаёт автоматическую резервную копию. Для применения
      изменений большинства ключей требуется полный перезапуск HA. Известные
      ограничения описаны в docs/beta.md. По возможности следует использовать
      специализированные инструменты (для автоматизаций, скриптов, сцен,
      помощников и шаблонных датчиков). ТРЕБУЕТ включённого главного переключателя
      «Включить бета-функции» выше (и в веб-интерфейсе), иначе этот подпараметр
      игнорируется во время выполнения независимо от указанного здесь значения.
  enable_yaml_edit_confirm:
    name: Требовать подтверждение изменений YAML (предпросмотр различий)
    description: >-
      Подпараметр редактирования конфигурации YAML, по умолчанию ВКЛЮЧЁН
      (рекомендуется). Первый вызов ha_config_set_yaml возвращает унифицированный
      diff с точным представлением будущих изменений на диске и токеном
      подтверждения, ничего не записывая. Изменение записывается только при
      повторном вызове с этим токеном. Это позволяет обнаружить непреднамеренные
      изменения за пределами запрошенной правки до их записи на диск (issue
      #1720). Отключайте только для экономии одного обмена запросом и ответом при
      каждом изменении.
  enable_yaml_packages_automation:
    name: Разрешить automation в packages/*.yaml
    description: >-
      Подпараметр редактирования конфигурации YAML. Если он включён,
      ha_config_set_yaml принимает yaml_path='automation' внутри packages/*.yaml.
      Если выключен, вызов отклоняется и на стороне клиента, и на стороне
      сервера. Инструмент для режима хранения (ha_config_set_automation) не
      затрагивается. По умолчанию ВЫКЛЮЧЕНО; действует, только если расположенный
      выше параметр «Включить редактирование конфигурации YAML» также включён.
  enable_yaml_packages_script:
    name: Разрешить script в packages/*.yaml
    description: >-
      Подпараметр редактирования конфигурации YAML. Если он включён,
      ha_config_set_yaml принимает yaml_path='script' внутри packages/*.yaml.
      Если выключен, вызов отклоняется и на стороне клиента, и на стороне
      сервера. Инструмент для режима хранения (ha_config_set_script) не
      затрагивается. По умолчанию ВЫКЛЮЧЕНО; действует, только если расположенный
      выше параметр «Включить редактирование конфигурации YAML» также включён.
  enable_yaml_packages_scene:
    name: Разрешить scene в packages/*.yaml
    description: >-
      Подпараметр редактирования конфигурации YAML. Если он включён,
      ha_config_set_yaml принимает yaml_path='scene' внутри packages/*.yaml.
      Если выключен, вызов отклоняется и на стороне клиента, и на стороне
      сервера. Инструмент для режима хранения (ha_config_set_scene) не
      затрагивается. По умолчанию ВЫКЛЮЧЕНО; действует, только если расположенный
      выше параметр «Включить редактирование конфигурации YAML» также включён.
  enable_code_mode:
    name: Включить песочницу пользовательских инструментов (бета)
    description: >-
      Бета-функция. Включает инструмент ha_manage_custom_tool, позволяющий
      ИИ-помощникам создавать, запускать, сохранять и удалять пользовательский
      Python-код в защищённой песочнице, когда встроенные инструменты не могут
      выполнить запрос. Код выполняется в изолированном интерпретаторе без доступа
      к файловой системе или произвольного доступа к сети. Код в песочнице может
      обращаться к REST API HA (api_get/api_post), отправлять команды WebSocket
      (ws_send), вызывать существующие MCP-инструменты (call_tool) или удалять
      сохранённый инструмент (delete_saved_tool). По умолчанию сохранённые
      инструменты хранятся в /data/saved_tools.json, поэтому переживают
      перезапуски дополнения и видны любому клиенту, способному подключиться.
      Известные ограничения описаны в docs/beta.md. Для применения требуется
      перезапуск. ТРЕБУЕТ включённого главного переключателя «Включить
      бета-функции» выше (и в веб-интерфейсе), иначе этот подпараметр игнорируется
      во время выполнения независимо от указанного здесь значения.
  enable_auto_backup:
    name: Включить автоматическое резервное копирование изменений
    description: >-
      Создаёт снимок отдельной сущности перед каждым обёрнутым вызовом MCP-инструмента
      записи или разрушительного действия (автоматизация, скрипт, сцена, помощник,
      панель, метка, категория, группа, зона, область, календарь, список дел,
      сущность, интеграция и родственные инструменты удаления). Снимки сохраняются
      как YAML-файлы в /data/ha_mcp_backups/ (можно переопределить через
      HAMCP_BACKUP_DIR); просматривать, восстанавливать и удалять их можно на
      вкладке «Резервные копии» в веб-интерфейсе настроек или через
      ha_manage_backup(scope='edits', ...). Выполняется по мере возможности:
      сбои записываются в журнал как WARNING, но никогда не блокируют основную
      операцию записи. По умолчанию включено; снимите флажок, чтобы отказаться.
      Для применения требуется перезапуск.
  auto_backup_throttle_minutes:
    name: Интервал автоматического резервного копирования (минуты)
    description: >-
      Интервал ограничения для каждой сущности. Значение 0 (по умолчанию)
      создаёт снимок при каждой обёрнутой операции записи. При N>0 создаётся не
      более одного снимка сущности за N минут. Диапазон: 0–1440.
  auto_backup_retain_per_entity:
    name: Хранение автоматических резервных копий (на сущность)
    description: >-
      Максимальное количество снимков, сохраняемых для каждой сущности. При
      каждом успешном создании снимка более старые снимки сверх этого лимита
      удаляются по ротации. По умолчанию: 100, диапазон: 1–10000.
  enable_snapshot_delete:
    name: Разрешить удаление снимков
    description: >-
      Позволяет ha_manage_backup удалять полные tar-архивы снимков HA
      (scope='snapshot', action='delete'). По умолчанию выключено: снимок может
      оказаться последней точкой восстановления после ошибочного изменения,
      поэтому пользователь должен явно разрешить это здесь. Даже после включения
      защищёнными остаются запланированные резервные копии, самый новый из
      оставшихся снимков и всё, что новее указанного ниже минимального возраста.
  snapshot_delete_min_age_days:
    name: Минимальный возраст снимка для удаления (дни)
    description: >-
      Снимок можно удалить, только если он не моложе указанного возраста.
      Диапазон: 0–365; значение 0 отключает это ограничение (защита самого нового
      снимка и запланированных резервных копий продолжает действовать).
      По умолчанию: 7.
  enable_lite_docstrings:
    name: Включить сокращённые строки документации инструментов (бета)
    description: >-
      Бета-функция. Заменяет строки документации нескольких объёмных инструментов
      ha-mcp (автоматизации, скрипты, сцены, помощники, панели,
      ha_call_service, ha_config_set_yaml) сокращёнными вариантами, которые
      переносят описание схем и примеров в инструмент ha_get_skill_guide (или его
      ресурс skill://). ПРЕДУПРЕЖДЕНИЕ: это сокращает неиспользуемый объём токенов,
      но может ухудшить работу LLM, поскольку сокращённые описания предполагают,
      что LLM действительно вызовет инструмент навыка или прочитает ресурс навыка
      для получения подробностей, а это не гарантируется. Некоторые модели
      пропускают дополнительный вызов инструмента и в итоге получают меньше
      указаний, чем раньше. Лучше всего использовать с клиентом, поддерживающим
      ресурсы MCP, или вместе с enable_tool_search. Для применения требуется
      перезапуск. ТРЕБУЕТ включённого главного переключателя «Включить
      бета-функции» выше (и в веб-интерфейсе), иначе этот подпараметр игнорируется
      во время выполнения независимо от указанного здесь значения.
  enable_mandatory_bps:
    name: Прикреплять навыки с рекомендациями при записи
    description: >-
      Главный переключатель функции доставки содержимого навыков для
      инструментов записи (issue #1182). Если он включён (по умолчанию), шесть
      инструментов записи конфигурации (автоматизации, скрипты, сцены, помощники,
      панели и необработанный YAML) при каждой успешной записи прикрепляют
      канонические справочные файлы с рекомендациями Home Assistant в поле
      `skill_content`, а также автоматически встраивают все разделы справки,
      упомянутые в предупреждениях о рекомендациях. Каждый инструмент также
      предоставляет параметр `MandatoryBPS` для отдельного вызова, который агент
      может установить в false при последующих вызовах после получения
      содержимого. Если этот главный переключатель выключен, содержимое
      skill_content НЕ отправляется независимо от параметра отдельного вызова
      или предупреждений BP. Рекомендуется оставить ВКЛЮЧЁННЫМ; отключайте только
      для моделей с очень маленьким контекстным окном. Отключение может снизить
      точность записи. Для применения требуется перезапуск.
  enable_strict_mandatory_bps:
    name: Строгий режим рекомендаций
    description: >-
      Строгий режим не позволяет клиенту использовать инструмент, пока тот не
      подтвердит, что прочитал рекомендации. Пока режим включён, шесть
      использующих рекомендации инструментов записи (автоматизации, скрипты,
      сцены, помощники, панели и необработанный YAML) блокируются и возвращают
      ошибку, предписывающую клиенту прочитать навык с рекомендациями через
      ha_get_skill_guide и передать полученный там ключ подтверждения. Пока режим
      включён, инструмент ha_get_skill_guide принудительно включён и заблокирован
      от отключения: только он выдаёт ключ подтверждения. Это дочерний параметр
      расположенного выше параметра «Прикреплять навыки с рекомендациями при
      записи», который не действует, пока родительский параметр выключен. Для
      применения требуется перезапуск.
  enable_filesystem_tools:
    name: Включить инструменты файловой системы (бета)
    description: >-
      Устанавливает HAMCP_ENABLE_FILESYSTEM_TOOLS=true. Разрешает прямой доступ на
      чтение и запись к файловой системе Home Assistant. ПРЕДУПРЕЖДЕНИЕ: это даёт
      MCP-серверу прямой доступ к конфиденциальным файлам вашей системы. Включайте
      только в том случае, если доверяете ИИ-помощнику операции с файлами. Для
      применения требуется перезапуск. ТРЕБУЕТ включённого главного переключателя
      «Включить бета-функции» выше (и в веб-интерфейсе), иначе этот подпараметр
      игнорируется во время выполнения независимо от указанного здесь значения.
  enable_dashboard_screenshot:
    name: Включить режим снимков панели (бета)
    description: >-
      Бета-функция, по умолчанию отключённая. Добавляет инструмент
      ha_get_dashboard_screenshot, а также параметры include_screenshot и
      return_screenshot в инструменты получения и изменения панелей, чтобы
      ИИ-помощники могли просматривать одно или несколько адаптивных изображений
      Lovelace (например, для проверки только что созданной панели). Поддерживает
      стабильные именованные представления, пакеты размеров для мобильных
      устройств, планшетов и настольных компьютеров, а также форматы
      PNG/JPEG/WebP/BMP. Отрисовка выполняется отдельным включаемым по желанию
      движком — дополнением balloob «Puppet» (безголовый Chromium), которое нужно
      установить один раз (добавить репозиторий дополнений balloob, затем
      установить «Puppet») и предоставить ему долгосрочный токен доступа. При
      развёртывании в Docker/Container этот движок запускается как sidecar, а его
      адрес задаётся в HAMCP_DASHBOARD_SCREENSHOT_ENGINE_URL. Ничего ресурсоёмкого
      не устанавливается, пока вы одновременно не включите эту функцию и не
      установите движок. Для применения требуется перезапуск. ТРЕБУЕТ включённого
      главного переключателя «Включить бета-функции» выше (и в веб-интерфейсе),
      иначе этот подпараметр игнорируется во время выполнения независимо от
      указанного здесь значения.
  tool_search_max_results:
    name: Максимальное количество результатов поиска инструментов
    description: >-
      Максимальное количество инструментов, возвращаемых ha_search_tools при
      включённом поиске инструментов. Меньшие значения (2–3) экономят токены
      контекста, но могут пропустить подходящие инструменты. Диапазон: 2–10.
      Требуется перезапуск.
  disabled_tools:
    name: Отключённые инструменты (через запятую)
    description: >-
      Перечисленные здесь инструменты принудительно отключаются и блокируются в
      веб-интерфейсе настроек на вкладке «Инструменты»: их нельзя включить там
      снова, не очистив сначала этот параметр. Небольшой набор обязательных
      инструментов (ha_search, ha_get_overview, ha_get_state, ha_report_issue,
      ha_manage_backup) нельзя отключить: они продолжат работать, даже если
      указаны здесь. ha_get_skill_guide можно отключить, только когда строгий
      режим рекомендаций (enable_strict_mandatory_bps) выключен. Укажите имена
      инструментов через запятую (например, ha_call_event,ha_eval_template).
  pinned_tools:
    name: Закреплённые инструменты (через запятую)
    description: >-
      Перечисленные здесь инструменты принудительно закрепляются: они отображаются
      в верхней части вкладки «Инструменты», и их нельзя открепить в
      веб-интерфейсе настроек, не очистив сначала этот параметр. Полезно вместе с
      поиском инструментов. Укажите имена инструментов через запятую.
  verify_ssl:
    name: Проверять сертификат TLS
    description: >-
      Проверяет TLS-сертификат сервера Home Assistant. Дополнение подключается
      через прокси Supervisor, поэтому обычно этот параметр ни на что не влияет и
      должен оставаться включённым. Отключайте его только в том случае, если вы
      перенастроили дополнение для подключения к HA через публичное HTTPS-имя
      хоста с самоподписанным сертификатом или несовпадающим именем хоста.
      Отключение ослабляет безопасность передачи данных; оставьте включённым,
      если точно не знаете, что его нужно отключить. Для применения требуется
      перезапуск.
