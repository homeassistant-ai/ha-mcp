---
configuration:
  backup_hint:
    name: Backup hint
    description: Controls when backup reminders are shown before risky operations.
  secret_path:
    name: Secret path override
    description: 'Optional custom HTTP path for the MCP server. Leave empty to use the auto-generated secure path.

      '
  enable_skills:
    name: Enable skills
    description: Serve bundled Home Assistant best-practice skills as MCP resources. Skills provide automation patterns, helper
      selection guides, and device control best practices. Clients must explicitly request them.
  enable_skills_as_tools:
    name: Enable skills as tools
    description: Expose skills via list_resources/read_resource tools for MCP clients that don't support resources natively.
      Adds 3 extra tools.
  enable_tool_search:
    name: Enable tool search
    description: Replace the full tool catalog with search-based discovery. Reduces idle context from ~46K to ~5K tokens.
      Use this if using an LLM without deferred tools or with smaller context windows. Tools are found via ha_search_tools
      and executed via categorized proxies (read/write/delete). Requires restart to take effect.
  enable_yaml_config_editing:
    name: Enable YAML config editing
    description: Allow AI assistants to add, replace, or remove top-level keys in configuration.yaml and packages/*.yaml.
      Only whitelisted keys are allowed (e.g., template, sensor, command_line, mqtt). Core keys like homeassistant, http,
      and recorder are blocked. A backup is created before every edit. Use for YAML-only features that have no UI or API alternative.
      Requires restart to take effect.
  tool_search_max_results:
    name: Tool search max results
    description: 'Maximum number of tools returned by ha_search_tools when tool search is enabled. Lower values (2-3) save
      context tokens but may miss relevant tools. Range: 2-10. Requires restart.'
  enabled_tools:
    name: Enabled tools
    description: Control which tools are available to AI assistants. Toggle groups on/off to enable or disable all tools in
      a category, or toggle individual tools. Mandatory tools (Search Entities, Get Overview, Get State, Report Issue) cannot
      be disabled. Requires restart.
    addons:
      name: Add-ons
      enabled:
        name: Enable all Add-ons tools
        description: Master toggle for the Add-ons group.
      ha_get_addon:
        name: Get Add-ons
      ha_call_addon_api:
        name: Call Add-on API
    areas_floors:
