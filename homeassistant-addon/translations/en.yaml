---
configuration:
  backup_hint:
    name: Backup hint
    description: Controls when backup reminders are shown before risky operations.
  secret_path:
    name: Secret path override
    description: |
      Optional custom HTTP path for the MCP server. Leave empty to use the auto-generated secure path.
  enable_skills:
    name: Enable skills
    description: >-
      Serve bundled Home Assistant best-practice skills as MCP resources.
      Skills provide automation patterns, helper selection guides, and device
      control best practices. Clients must explicitly request them.
  enable_skills_as_tools:
    name: Enable skills as tools
    description: >-
      Expose skills via list_resources/read_resource tools for MCP clients
      that don't support resources natively. Adds 3 extra tools.
  enable_tool_search:
    name: Enable tool search
    description: >-
      Replace the full tool catalog with search-based discovery. Reduces
      idle context from ~46K to ~5K tokens. Use this if using an LLM without
      deferred tools or with smaller context windows. Tools are found via
      ha_search_tools and executed via categorized proxies (read/write/delete).
      Requires restart to take effect.
  enable_yaml_config_editing:
    name: Enable YAML config editing
    description: >-
      Allow AI assistants to add, replace, or remove top-level keys in
      configuration.yaml and packages/*.yaml. Only whitelisted keys are
      allowed (e.g., template, sensor, command_line, mqtt). Core keys
      like homeassistant, http, and recorder are blocked. A backup is
      created before every edit. Use for YAML-only features that have no
      UI or API alternative. Requires restart to take effect.
  tool_search_max_results:
    name: Tool search max results
    description: >-
      Maximum number of tools returned by ha_search_tools when tool
      search is enabled. Lower values (2-3) save context tokens but
      may miss relevant tools. Range: 2-10. Requires restart.
  tools:
    name: Tools
    description: >-
      Configure tool availability and pinning. Each tool can be unpinned
      (enabled), pinned (enabled and always visible in search), or disabled.
      Mandatory tools cannot be disabled. Requires restart.
    add-ons:
      name: "Add-ons"
      enabled:
        name: Enable all Add-ons tools
      ha_call_addon_api:
        name: "Call Add-on API (destructive)"
        description: "Call an add-on's HTTP or WebSocket API."
      ha_get_addon:
        name: "Get Add-ons (read-only)"
        description: "Get Home Assistant add-ons - list installed, available, or get details for one."
    areas_floors:
      name: "Areas & Floors"
      enabled:
        name: Enable all Areas & Floors tools
      ha_config_list_areas:
        name: "List Areas (read-only)"
        description: "List all Home Assistant areas (rooms)."
      ha_config_list_floors:
        name: "List Floors (read-only)"
        description: "List all Home Assistant floors."
      ha_config_remove_area:
        name: "Remove Area (destructive)"
        description: "Delete a Home Assistant area."
      ha_config_remove_floor:
        name: "Remove Floor (destructive)"
        description: "Delete a Home Assistant floor."
      ha_config_set_area:
        name: "Create or Update Area (destructive)"
        description: "Create or update a Home Assistant area (room)."
      ha_config_set_floor:
        name: "Create or Update Floor (destructive)"
        description: "Create or update a Home Assistant floor."
    automations:
      name: "Automations"
      enabled:
        name: Enable all Automations tools
      ha_config_get_automation:
        name: "Get Automation Config (read-only)"
        description: "Retrieve Home Assistant automation configuration."
      ha_config_remove_automation:
        name: "Remove Automation (destructive)"
        description: "Delete a Home Assistant automation."
      ha_config_set_automation:
        name: "Create or Update Automation (destructive)"
        description: "Create or update a Home Assistant automation."
    blueprints:
      name: "Blueprints"
      enabled:
        name: Enable all Blueprints tools
      ha_get_blueprint:
        name: "Get Blueprint (read-only)"
        description: "Get blueprint information - list all blueprints or get details for a specific one."
      ha_import_blueprint:
        name: "Import Blueprint (destructive)"
        description: "Import a blueprint from a URL."
    calendar:
